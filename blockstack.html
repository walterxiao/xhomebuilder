<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block Stacker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --accent: #e94560;
  --text: #eaeaea;
  --muted: #888;
  --radius: 12px;
}

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; height: 100%; height: 100dvh; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* ── ENTRY ── */
#screen-entry {
  gap: 16px;
  padding: 24px;
  justify-content: flex-start;
  overflow: hidden;
  padding-top: max(32px, env(safe-area-inset-top));
}
.entry-title {
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(233,69,96,0.5);
}
.entry-sub { color: var(--muted); font-size: 0.9rem; }
.entry-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
.entry-form input {
  background: var(--surface);
  border: 2px solid #333;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 1rem;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
}
.entry-form input:focus { border-color: var(--accent); }
.entry-form input::placeholder { color: var(--muted); }
.btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 700;
  padding: 12px 20px;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.96); }
.btn.secondary {
  background: var(--surface);
  border: 2px solid #444;
  color: var(--text);
}
.btn.secondary:active { opacity: 0.7; }
.sessions-section { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; min-height: 0; }
.sessions-header { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
.sessions-refresh { cursor: pointer; font-size: 1.1rem; padding: 4px; opacity: 0.7; line-height: 1; }
.sessions-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.session-card { background: var(--surface); border: 1px solid #2a2a5a; border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.session-players { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.session-dots { display: flex; gap: 4px; margin-bottom: 2px; }
.session-names { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-status { font-size: 0.75rem; color: var(--muted); }
.no-sessions { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 24px; }
.btn.small { font-size: 0.85rem; padding: 8px 16px; flex-shrink: 0; }

/* ── LOBBY ── */
#screen-lobby { gap: 16px; padding: 24px; justify-content: flex-start; padding-top: 60px; }
.lobby-title { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
.session-id-box {
  background: var(--surface);
  border: 2px solid #333;
  border-radius: var(--radius);
  padding: 12px 20px;
  text-align: center;
  width: 100%;
  max-width: 340px;
}
.session-id-box .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
.session-id-box .code { font-size: 1.6rem; font-weight: 900; letter-spacing: 4px; color: var(--accent); }
.player-list { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
.player-chip {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--radius);
  padding: 10px 14px;
}
.player-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.player-chip-name { font-weight: 600; }
.player-chip-you { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
.lobby-hint { font-size: 0.8rem; color: var(--muted); text-align: center; max-width: 300px; }

/* ── GAME ── */
#screen-game {
  flex-direction: column;
  justify-content: flex-start;
  align-items: stretch;
  padding: 0;
  overflow: hidden;
}
#top-bar {
  height: 56px;
  background: var(--surface);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 2px solid #222;
  z-index: 10;
}
#turn-indicator {
  flex: 1;
  font-weight: 700;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#timer-display {
  font-size: 1.2rem;
  font-weight: 900;
  min-width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
#timer-display.urgent { color: var(--accent); animation: pulse 0.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
#game-canvas { display: block; touch-action: none; }

#bottom-bar {
  height: 72px;
  background: var(--surface);
  display: flex;
  align-items: center;
  padding: 0 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  gap: 12px;
  flex-shrink: 0;
  border-top: 2px solid #222;
}
#drop-btn {
  flex-shrink: 0;
  width: 90px;
  height: 48px;
  font-size: 1.1rem;
  border-radius: 24px;
}
#drop-btn:disabled {
  opacity: 0.35;
  cursor: default;
}
#chat-input-wrap { flex: 1; display: flex; gap: 8px; }
#chat-input {
  flex: 1;
  background: var(--bg);
  border: 2px solid #333;
  border-radius: 20px;
  color: var(--text);
  font-size: 0.9rem;
  padding: 8px 14px;
  outline: none;
}
#chat-input:focus { border-color: #555; }
#chat-send-btn { width: 44px; height: 44px; border-radius: 50%; font-size: 1rem; padding: 0; }

/* Chat overlay */
#chat-overlay {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 5;
}
.chat-msg {
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 0.8rem;
  color: #fff;
  opacity: 1;
  transition: opacity 1s ease;
  max-width: 90%;
}
.chat-msg.fading { opacity: 0; }

/* ── OVER SCREEN ── */
#screen-over { gap: 20px; padding: 24px; }
.over-title { font-size: 2rem; font-weight: 800; }
.over-sub { color: var(--muted); font-size: 1rem; text-align: center; }
.over-stack-info { font-size: 1.1rem; font-weight: 600; }

/* Observer badge */
#obs-badge {
  position: absolute;
  top: 64px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  color: #aaa;
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 20px;
  z-index: 20;
  display: none;
}
#obs-badge.visible { display: block; }

/* Error toast */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; border-radius: 20px;
  padding: 10px 20px; font-size: 0.9rem; z-index: 1000;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="screen-entry" class="screen active">
  <div class="entry-title">🧱 Block Stacker</div>
  <div class="entry-sub">Take turns dropping blocks. Don't topple the tower!</div>
  <div class="entry-form">
    <input id="entry-name" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
    <button class="btn" onclick="createGame()">Create New Game</button>
  </div>
  <div class="sessions-section">
    <div class="sessions-header">
      <span>Active Games</span>
      <span class="sessions-refresh" onclick="loadSessions()" title="Refresh">↻</span>
    </div>
    <div id="sessions-list" class="sessions-list"><div class="no-sessions">Loading…</div></div>
  </div>
</div>

<!-- LOBBY SCREEN -->
<div id="screen-lobby" class="screen">
  <div class="lobby-title">Waiting Room</div>
  <div class="session-id-box">
    <div class="label">Share this code with friends</div>
    <div class="code" id="lobby-code">------</div>
  </div>
  <div class="player-list" id="lobby-players"></div>
  <div class="lobby-hint">Up to 6 players. Round-robin turns. You can join mid-game!</div>
  <button class="btn" id="start-btn" onclick="startGame()">Start Game</button>
  <button class="btn secondary" onclick="startGame()" id="join-start-btn" style="display:none">Start (You're Player 1)</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div id="top-bar">
    <div id="turn-indicator">Waiting…</div>
    <div id="timer-display">15</div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="obs-badge">👁 Observing</div>
    <div id="chat-overlay"></div>
  </div>
  <div id="bottom-bar">
    <button class="btn" id="drop-btn" onclick="dropBlock()" disabled>DROP</button>
    <div id="chat-input-wrap">
      <input id="chat-input" type="text" placeholder="Chat…" maxlength="80" autocomplete="off">
      <button class="btn secondary" id="chat-send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-over" class="screen">
  <div class="over-title" id="over-title">Game Over!</div>
  <div class="over-sub" id="over-sub"></div>
  <div class="over-stack-info" id="over-height"></div>
  <button class="btn" id="play-again-btn" onclick="playAgain()" style="display:none">Play Again</button>
  <button class="btn secondary" onclick="backToEntry()">Back to Menu</button>
</div>

<div id="toast"></div>

<script>
'use strict';
// ── Constants ──
const GAME_W = 400;
const GROUND_Y = 520;
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c'];

// ── State ──
let ws = null;
let sessionId = null;
let myIdx = -1;
let myColor = null;
let isObserver = false;
let isHost = false;
let players = [];
let stack = [];
let currentTurn = -1;
let currentBlock = null;
let sliderX = 0;
let remoteSliderX = 0; // slider position of the current-turn player (for other viewers)
let sliderDir = 1;
let sliderSpeed = 2.5; // px/frame at canvas scale
let timerLeft = 15;
let gameOver = false;
let animFrame = null;

// Canvas / rendering
let canvas, ctx;
let canvasW, canvasH;
let viewportY = 0;       // how many px we've scrolled up (positive = up)
let targetViewportY = 0;
let shakeAmp = 0;
let shakeDx = 0, shakeDy = 0;

// Falling block animation
let fallingAnim = null; // { block, fromY, toY, startTime, duration }
let squishAnim = null;  // { block, startTime }
let collapseAnim = null; // { particles, startTime, duration }
let preCollapse = false;     // intense wobble before scatter
let preCollapseStart = 0;    // timestamp preCollapse began
let unstableBlockId = -1;    // ID of the block that caused the collapse
let tipDir = 1;              // direction the unstable block leans (±1)
let flashAnim = null;        // { startTime, duration } red flash overlay
let wobbleTime = 0;

// ── Init ──
window.addEventListener('load', () => {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');

  const savedName = localStorage.getItem('phub_name');
  if (savedName) document.getElementById('entry-name').value = savedName;

  document.getElementById('entry-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') createGame();
  });
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  // Tap canvas to drop (mobile-friendly)
  canvas.addEventListener('click', () => {
    if (myIdx === currentTurn && !gameOver && !fallingAnim) dropBlock();
  });

  resizeCanvas();
  window.addEventListener('resize', () => {
    resizeCanvas();
    const init = getInitialViewportY();
    viewportY = init; targetViewportY = init;
    updateTargetViewport();
  });
  loadSessions();
  setInterval(loadSessions, 5000);
});

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvasW = wrap.clientWidth;
  canvasH = wrap.clientHeight;
  canvas.width = canvasW;
  canvas.height = canvasH;
  if (!animFrame) renderLoop();
}

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Canvas was 0×0 while screen-game was display:none — resize now that it's visible
  if (id === 'screen-game') resizeCanvas();
}

function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── WebSocket ──
function connect(onOpen) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/blockstack`);
  ws.onopen = onOpen;
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => { if (!gameOver) showToast('Disconnected'); };
  ws.onerror = () => showToast('Connection error');
}

function wsSend(obj) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

// ── Entry Actions ──
function createGame() {
  const name = document.getElementById('entry-name').value.trim() || 'Player 1';
  localStorage.setItem('phub_name', name);
  connect(() => wsSend({ type: 'create', name }));
}

function joinGame(sid) {
  const name = document.getElementById('entry-name').value.trim() || 'Player';
  if (!sid) { showToast('Select a game to join'); return; }
  localStorage.setItem('phub_name', name);
  connect(() => wsSend({ type: 'join', sessionId: sid, name }));
}

async function loadSessions() {
  try {
    const res = await fetch('/api/blockstack/sessions');
    if (!res.ok) return;
    renderSessionList(await res.json());
  } catch (_) {}
}

function renderSessionList(list) {
  const el = document.getElementById('sessions-list');
  if (!el) return;
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="no-sessions">No active games yet.<br>Create one to get started!</div>';
    return;
  }
  el.innerHTML = list.map(s => {
    const statusText = s.gameOver
      ? 'Finished'
      : s.started
        ? `In progress · ${s.blockCount} block${s.blockCount !== 1 ? 's' : ''}`
        : `Waiting · ${s.players.length}/${s.maxPlayers} players`;
    const dots = s.players.map(p =>
      `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color}"></span>`
    ).join('');
    const names = s.players.map(p => escHtml(p.name)).join(', ') || 'Empty';
    return `<div class="session-card">
      <div class="session-players">
        <div class="session-dots">${dots}</div>
        <div class="session-names">${names}</div>
        <div class="session-status">${statusText}</div>
      </div>
      <button class="btn small" onclick="joinGame('${s.id}')">Join</button>
    </div>`;
  }).join('');
}

function startGame() {
  wsSend({ type: 'start' });
}

function dropBlock() {
  if (myIdx !== currentTurn || gameOver) return;
  wsSend({ type: 'drop', x: Math.round(sliderX) });
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  wsSend({ type: 'chat', text });
}

function playAgain() {
  wsSend({ type: 'play_again' });
}

function backToEntry() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  resetLocalState();
  showScreen('screen-entry');
}

function resetLocalState() {
  stack = [];
  players = [];
  currentTurn = -1;
  currentBlock = null;
  sliderX = 0;
  remoteSliderX = 0;
  sliderDir = 1;
  viewportY = 0;
  targetViewportY = 0;
  shakeAmp = 0;
  fallingAnim = null;
  squishAnim = null;
  collapseAnim = null;
  preCollapse = false;
  preCollapseStart = 0;
  unstableBlockId = -1;
  tipDir = 1;
  flashAnim = null;
  gameOver = false;
  isObserver = false;
  timerLeft = 15;
}

// ── Message Handlers ──
function handleMsg(msg) {
  switch (msg.type) {
    case 'created':
      sessionId = msg.sessionId;
      myIdx = msg.playerIdx;
      myColor = msg.color;
      isHost = true;
      document.getElementById('lobby-code').textContent = msg.sessionId.toUpperCase();
      showScreen('screen-lobby');
      document.getElementById('start-btn').style.display = 'block';
      break;

    case 'joined':
      sessionId = msg.sessionId;
      myIdx = msg.playerIdx;
      myColor = msg.color;
      isHost = myIdx === 0;
      document.getElementById('lobby-code').textContent = msg.sessionId.toUpperCase();
      document.getElementById('start-btn').style.display = isHost ? 'block' : 'none';
      if (msg.started) {
        // Mid-game join
        players = msg.players;
        stack = msg.stack || [];
        currentTurn = msg.currentTurn;
        currentBlock = msg.currentBlock;
        timerLeft = msg.timeLeft;
        showScreen('screen-game');
        const iv = getInitialViewportY();
        viewportY = iv; targetViewportY = iv;
        updateTargetViewport(); // scroll to show stack top
        updateTopBar();
        updateDropBtn();
        if (!animFrame) animFrame = requestAnimationFrame(renderLoop);
      } else {
        showScreen('screen-lobby');
      }
      break;

    case 'obs_joined':
      isObserver = true;
      players = msg.players;
      stack = msg.stack || [];
      currentTurn = msg.currentTurn;
      currentBlock = msg.currentBlock;
      timerLeft = msg.timeLeft || 15;
      document.getElementById('obs-badge').classList.add('visible');
      document.getElementById('drop-btn').disabled = true;
      if (msg.started) {
        showScreen('screen-game');
        updateTopBar();
        if (!animFrame) animFrame = requestAnimationFrame(renderLoop);
      } else {
        document.getElementById('lobby-code').textContent = (msg.sessionId || '').toUpperCase();
        showScreen('screen-lobby');
      }
      break;

    case 'lobby':
      players = msg.players;
      renderLobby();
      if (msg.started && currentTurn < 0) {
        currentTurn = msg.currentTurn;
        currentBlock = msg.currentBlock;
        stack = msg.stack || [];
      }
      break;

    case 'start':
      players = msg.players;
      stack = [];
      gameOver = false;
      fallingAnim = null; squishAnim = null; collapseAnim = null;
      preCollapse = false; flashAnim = null;
      showScreen('screen-game'); // resizes canvas first
      { const iv = getInitialViewportY(); viewportY = iv; targetViewportY = iv; }
      updateDropBtn();
      if (!animFrame) animFrame = requestAnimationFrame(renderLoop);
      break;

    case 'new_turn':
      currentTurn = msg.playerIdx;
      currentBlock = msg.block;
      timerLeft = msg.timeLeft;
      sliderX = 0;
      remoteSliderX = 0;
      sliderDir = 1;
      updateTopBar();
      updateDropBtn();
      break;

    case 'slide_pos':
      remoteSliderX = msg.x;
      break;

    case 'timer':
      timerLeft = msg.timeLeft;
      updateTimerDisplay();
      break;

    case 'dropped': {
      const b = msg.block;
      const SLIDER_Y = 12;
      const fromWorldY = viewportY + SLIDER_Y;
      const endY = b.y;
      fallingAnim = {
        block: b,
        fromY: fromWorldY,
        toY: endY,
        startTime: performance.now(),
        duration: Math.min(800, Math.max(350, (endY - fromWorldY) * 0.55))
      };
      setTimeout(() => {
        stack.push(b);
        if (b.stable === false) {
          unstableBlockId = b.id;
          tipDir = Math.random() > 0.5 ? 1 : -1;
          preCollapseStart = performance.now();
          preCollapse = true;
          shakeAmp = 8;
        } else {
          squishAnim = { block: b, startTime: performance.now(), duration: 250 };
          updateTargetViewport();
        }
        fallingAnim = null;
      }, fallingAnim.duration);
      break;
    }

    case 'game_over': {
      gameOver = true;
      currentTurn = -1;
      updateDropBtn();
      startCollapseAnim();
      const loserName = msg.loserName || 'Someone';
      const heightCount = msg.stack ? msg.stack.length : stack.length;
      setTimeout(() => {
        document.getElementById('over-title').textContent = '💥 Tower Collapsed!';
        document.getElementById('over-sub').textContent = `${loserName} toppled the tower`;
        document.getElementById('over-height').textContent = `Stack height: ${heightCount} blocks`;
        document.getElementById('play-again-btn').style.display = isHost ? 'block' : 'none';
        showScreen('screen-over');
      }, 3500);
      break;
    }

    case 'play_again':
      players = msg.players;
      stack = [];
      gameOver = false;
      fallingAnim = null; squishAnim = null; collapseAnim = null;
      preCollapse = false; flashAnim = null;
      showScreen('screen-game'); // resizes canvas first
      { const iv = getInitialViewportY(); viewportY = iv; targetViewportY = iv; }
      updateDropBtn();
      break;

    case 'chat':
      addChatMsg(msg.name, msg.text);
      break;

    case 'error':
      showToast(msg.msg || 'Error');
      break;
  }
}

// ── Lobby rendering ──
function renderLobby() {
  const list = document.getElementById('lobby-players');
  list.innerHTML = '';
  for (const p of players) {
    const div = document.createElement('div');
    div.className = 'player-chip';
    div.innerHTML = `<div class="player-dot" style="background:${p.color}"></div>
      <div class="player-chip-name">${escHtml(p.name)}</div>
      ${p.idx === myIdx ? '<div class="player-chip-you">You</div>' : ''}`;
    list.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Top bar / UI ──
function updateTopBar() {
  const indicator = document.getElementById('turn-indicator');
  if (gameOver) { indicator.textContent = 'Game Over'; return; }
  if (currentTurn < 0 || !players[currentTurn]) { indicator.textContent = 'Waiting…'; return; }
  const p = players[currentTurn];
  const isMe = p.idx === myIdx;
  indicator.innerHTML = `<span style="color:${p.color};font-weight:900">${escHtml(p.name)}</span>${isMe ? ' — your turn!' : "'s turn"}`;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = timerLeft;
  el.classList.toggle('urgent', timerLeft <= 5);
}

function updateDropBtn() {
  const btn = document.getElementById('drop-btn');
  const isMyTurn = !isObserver && myIdx === currentTurn && !gameOver;
  btn.disabled = !isMyTurn;
}

// ── Chat ──
function addChatMsg(name, text) {
  const overlay = document.getElementById('chat-overlay');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.textContent = `${name}: ${text}`;
  overlay.appendChild(div);
  while (overlay.children.length > 5) overlay.removeChild(overlay.firstChild);
  setTimeout(() => div.classList.add('fading'), 4000);
  setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 5000);
}

// ── Physics Helpers (mirrored from server for local rendering) ──
function computeLandYClient(bx, bw, bh) {
  let highestTop = GROUND_Y;
  for (const b of stack) {
    const overlapL = Math.max(bx, b.x);
    const overlapR = Math.min(bx + bw, b.x + b.w);
    if (overlapR > overlapL + 1 && b.y < highestTop) {
      highestTop = b.y;
    }
  }
  return highestTop - bh;
}

function computeStackHeight() {
  return stack.length;
}

function getStackTopY() {
  if (stack.length === 0) return GROUND_Y;
  return Math.min(...stack.map(b => b.y));
}

function updateTargetViewport() {
  if (stack.length === 0) return;
  const topY = getStackTopY();
  // Only scroll when stack top rises above 1/3 from the canvas top
  // (= 2/3 from the bottom, as the user wants)
  const topOnCanvas = topY - viewportY;
  if (topOnCanvas < canvasH / 3) {
    // Required viewportY to keep stack top at 1/3 from top
    const newTarget = topY - canvasH / 3;
    // newTarget is more negative than current → decrease targetViewportY
    if (newTarget < targetViewportY) {
      targetViewportY = newTarget;
    }
  }
}

function getInitialViewportY() {
  // Place ground 20px above the canvas bottom; can be negative (fine)
  return GROUND_Y - canvasH + 20;
}

// ── Slider constraint: new block must touch the topmost block ──

function getSliderConstraint() {
  if (!currentBlock || stack.length === 0) return { min: 0, max: GAME_W - (currentBlock ? currentBlock.w : 0) };
  const topY = getStackTopY();
  // All blocks at the top level
  const topBlocks = stack.filter(b => Math.abs(b.y - topY) < 2);
  if (topBlocks.length === 0) return { min: 0, max: GAME_W - currentBlock.w };
  const bw = currentBlock.w;
  // Block must overlap at least one top block horizontally
  let minX = Infinity, maxX = -Infinity;
  for (const b of topBlocks) {
    minX = Math.min(minX, b.x - bw + 2);
    maxX = Math.max(maxX, b.x + b.w - 2);
  }
  return { min: Math.max(0, minX), max: Math.min(GAME_W - bw, maxX) };
}

// ── Collapse animation ──
function startCollapseAnim() {
  preCollapse = false;
  flashAnim = { startTime: performance.now(), duration: 700 };
  shakeAmp = 26;

  const stackTopY = getStackTopY();
  const stackHeight = Math.max(1, GROUND_Y - stackTopY);

  // Canvas-space particles with cascade delay: top blocks fall first
  const particles = stack.map(b => {
    const cv = worldToCanvas(b.x + b.w / 2, b.y + b.h / 2);
    const relH = (GROUND_Y - b.y) / stackHeight; // 0=ground, 1=top
    const isUnstable = b.id === unstableBlockId;
    const side = isUnstable ? tipDir : (Math.random() > 0.5 ? 1 : -1);
    // Top blocks fall immediately; bottom blocks wait up to 700ms
    const delay = isUnstable ? 0 : Math.round((1 - relH) * 700);
    return {
      x: cv.x, y: cv.y,   // mutable position (only updated after delay)
      x0: cv.x, y0: cv.y, // original canvas position (for pre-fall rendering)
      w: b.w, h: b.h,
      color: b.color,
      vx: side * (90 + relH * 260) * (0.5 + Math.random()),
      vy: -(50 + relH * 200) * (0.5 + Math.random()),
      rot: 0,
      rotV: side * (5 + Math.random() * 8),
      opacity: 1,
      delay
    };
  });

  collapseAnim = { particles, startTime: performance.now(), duration: 3200 };
  stack = [];
}

// ── Render Loop ──
function renderLoop(ts) {
  animFrame = requestAnimationFrame(renderLoop);
  wobbleTime = (ts || 0) * 0.003;

  // Lerp viewport
  viewportY += (targetViewportY - viewportY) * 0.08;

  // Screen shake decay
  if (shakeAmp > 0) {
    shakeAmp *= 0.9;
    if (shakeAmp < 0.5) shakeAmp = 0;
    shakeDx = (Math.random() - 0.5) * shakeAmp;
    shakeDy = (Math.random() - 0.5) * shakeAmp;
  } else { shakeDx = 0; shakeDy = 0; }

  // Advance slider (only for current player), constrained to overlap top of stack
  if (!gameOver && currentBlock && myIdx === currentTurn && !fallingAnim) {
    const c = getSliderConstraint();
    sliderX += sliderDir * sliderSpeed;
    if (sliderX >= c.max) { sliderX = c.max; sliderDir = -1; }
    else if (sliderX <= c.min) { sliderX = c.min; sliderDir = 1; }
    wsSend({ type: 'slide_pos', x: Math.round(sliderX) });
  }

  draw(ts);
}

function worldToCanvas(x, y) {
  return { x: x + (canvasW - GAME_W) / 2 + shakeDx, y: y - viewportY + shakeDy };
}

function draw(ts) {
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  const offsetX = (canvasW - GAME_W) / 2;

  // Draw grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSpacing = 40;
  const gridOffsetY = (-viewportY % gridSpacing + gridSpacing) % gridSpacing;
  for (let gy = gridOffsetY; gy < canvasH; gy += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvasW, gy); ctx.stroke();
  }
  for (let gx = offsetX % gridSpacing; gx < canvasW; gx += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvasH); ctx.stroke();
  }

  // Draw stacked blocks
  const now = performance.now();
  for (const b of stack) {
    let sx = 1, sy = 1, bx = b.x, by = b.y, bw = b.w, bh = b.h;

    // Squish animation
    if (squishAnim && squishAnim.block === b) {
      const t = Math.min(1, (now - squishAnim.startTime) / squishAnim.duration);
      const squishCurve = Math.sin(t * Math.PI); // 0→1→0
      sy = 1 - squishCurve * 0.25;
      sx = 1 + squishCurve * 0.15;
      if (t >= 1) squishAnim = null;
    }

    // Wobble — intensifies during pre-collapse warning
    if (b.wobble || preCollapse) {
      const isUnstable = preCollapse && b.id === unstableBlockId;
      let angle;
      if (isUnstable) {
        // Growing directional lean toward the fall side
        const tpc = Math.min(1, (now - preCollapseStart) / 1400);
        const tipAmp = 0.07 + tpc * 0.30;
        angle = Math.sin(wobbleTime * 9 + tpc * 4) * tipAmp * tipDir;
      } else {
        const freq = preCollapse ? 11 : 4;
        const baseAmp = preCollapse ? 0.09 : 0.035;
        angle = Math.sin(wobbleTime * freq + b.id * 0.9) * baseAmp;
      }
      const cv = worldToCanvas(bx + bw / 2, by + bh / 2);
      ctx.save();
      ctx.translate(cv.x, cv.y);
      ctx.rotate(angle);
      if (isUnstable) {
        ctx.shadowColor = '#ff2222';
        ctx.shadowBlur = 20;
        drawBlock(ctx, -bw * sx / 2, -bh * sy / 2, bw * sx, bh * sy, b.color);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.38 + 0.2 * Math.abs(Math.sin(wobbleTime * 8));
        ctx.fillStyle = '#ff3333';
        roundRect(ctx, -bw * sx / 2, -bh * sy / 2, bw * sx, bh * sy, 4);
        ctx.fill();
      } else {
        drawBlock(ctx, -bw * sx / 2, -bh * sy / 2, bw * sx, bh * sy, b.color);
      }
      ctx.restore();
      continue;
    }

    const cv = worldToCanvas(bx + bw / 2, by + bh / 2);
    ctx.save();
    ctx.translate(cv.x, cv.y);
    drawBlock(ctx, -bw * sx / 2, -bh * sy / 2, bw * sx, bh * sy, b.color);
    ctx.restore();
  }

  // Falling block animation
  if (fallingAnim) {
    const b = fallingAnim.block;
    const elapsed = now - fallingAnim.startTime;
    const t = Math.min(1, elapsed / fallingAnim.duration);
    // Ease in (gravity feel): t^2
    const eased = t * t;
    const drawY = fallingAnim.fromY + (fallingAnim.toY - fallingAnim.fromY) * eased;
    const cv = worldToCanvas(b.x + b.w / 2, drawY + b.h / 2);
    ctx.save();
    ctx.translate(cv.x, cv.y);
    drawBlock(ctx, -b.w / 2, -b.h / 2, b.w, b.h, b.color);
    ctx.restore();
  }

  // Slider block — drawn at fixed canvas Y (not world space), always visible
  if (!gameOver && currentBlock && !fallingAnim) {
    const isMyTurn = myIdx === currentTurn;
    const col = players[currentTurn] ? players[currentTurn].color : '#888';
    const bw = currentBlock.w, bh = currentBlock.h;
    const sx = isMyTurn ? sliderX : remoteSliderX;
    const SLIDER_Y = 12;
    const canvasBlockX = offsetX + sx;

    ctx.save();
    if (isMyTurn) {
      ctx.globalAlpha = 0.95;
      ctx.shadowColor = col;
      ctx.shadowBlur = 16;
    } else {
      ctx.globalAlpha = 0.6;
    }
    drawBlock(ctx, canvasBlockX, SLIDER_Y, bw, bh, col);
    ctx.restore();

    // Ghost landing preview
    const landY = computeLandYClient(sx, bw, bh);
    const gcv = worldToCanvas(sx, landY);
    if (gcv.y > SLIDER_Y + bh + 20 && gcv.y < canvasH - bh) {
      ctx.save();
      ctx.globalAlpha = 0.18;
      drawBlock(ctx, gcv.x, gcv.y, bw, bh, col);
      ctx.restore();
      // Dashed guide line
      ctx.save();
      ctx.strokeStyle = col;
      ctx.globalAlpha = 0.12;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(canvasBlockX + bw / 2, SLIDER_Y + bh);
      ctx.lineTo(gcv.x + bw / 2, gcv.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Ground line
  const groundCv = worldToCanvas(0, GROUND_Y);
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(offsetX + shakeDx, groundCv.y);
  ctx.lineTo(offsetX + GAME_W + shakeDx, groundCv.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Left/right walls
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(offsetX + shakeDx, 0);
  ctx.lineTo(offsetX + shakeDx, canvasH);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(offsetX + GAME_W + shakeDx, 0);
  ctx.lineTo(offsetX + GAME_W + shakeDx, canvasH);
  ctx.stroke();
  ctx.restore();

  // Red flash overlay (on collapse)
  if (flashAnim) {
    const ft = Math.min(1, (now - flashAnim.startTime) / flashAnim.duration);
    if (ft >= 1) { flashAnim = null; } else {
      const alpha = (1 - ft) * 0.45;
      ctx.save();
      ctx.fillStyle = `rgba(255,40,40,${alpha})`;
      ctx.fillRect(0, 0, canvasW, canvasH);
      ctx.restore();
    }
  }

  // Pre-collapse "UNSTABLE!" warning text
  if (preCollapse) {
    const pulse = 0.65 + 0.35 * Math.abs(Math.sin(wobbleTime * 8));
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.font = `bold ${Math.round(canvasW * 0.075)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.fillText('⚠ UNSTABLE!', canvasW / 2, canvasH / 2);
    ctx.restore();
  }

  // Collapse cascade animation — canvas-space particles with per-block delays
  if (collapseAnim) {
    const elapsed = now - collapseAnim.startTime;
    const dt = 1 / 60;

    // Physics update — only for particles whose delay has passed
    for (const p of collapseAnim.particles) {
      if (elapsed < p.delay) continue;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 560 * dt; // gravity
      p.rot += p.rotV * dt;
      const fallDur = collapseAnim.duration - p.delay;
      p.opacity = Math.max(0, 1 - (elapsed - p.delay) / fallDur);
    }

    // Render
    for (const p of collapseAnim.particles) {
      const waitLeft = p.delay - elapsed; // ms until this block falls (negative = already falling)
      if (waitLeft > 0) {
        // Still in place — flash red as its turn approaches (last 450ms of wait)
        ctx.save();
        ctx.translate(p.x0, p.y0);
        drawBlock(ctx, -p.w / 2, -p.h / 2, p.w, p.h, p.color);
        if (waitLeft < 450) {
          const redT = 1 - waitLeft / 450;
          ctx.globalAlpha = redT * 0.65;
          ctx.fillStyle = '#ff3333';
          roundRect(ctx, -p.w / 2, -p.h / 2, p.w, p.h, 4);
          ctx.fill();
        }
        ctx.restore();
      } else {
        if (p.opacity <= 0) continue;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        drawBlock(ctx, -p.w / 2, -p.h / 2, p.w, p.h, p.color);
        ctx.restore();
      }
    }

    if (elapsed > collapseAnim.duration) collapseAnim = null;
  }

  // Height indicator
  if (stack.length > 0 && !gameOver) {
    const topY = getStackTopY();
    const label = `${stack.length} blocks`;
    const cv = worldToCanvas(GAME_W - 5, topY - 10);
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(label, cv.x, cv.y);
    ctx.restore();
  }
}

function drawBlock(ctx, x, y, w, h, color) {
  const radius = 4;
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;

  // Main fill
  ctx.fillStyle = color;
  roundRect(ctx, x, y, w, h, radius);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Highlight top
  const hlGrad = ctx.createLinearGradient(x, y, x, y + h * 0.5);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  roundRect(ctx, x, y, w, h * 0.5, radius);
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, w, h, radius);
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
