# XcodeGen spec.  Run `xcodegen generate` in this directory to create
# `RacingGame.xcodeproj`, then `open RacingGame.xcodeproj`.
#
#   brew install xcodegen
#   cd ios && xcodegen generate && open RacingGame.xcodeproj
#
name: RacingGame
options:
  bundleIdPrefix: com.example.racing
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad

targets:
  RacingGame:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RacingGame
    resources:
      - path: RacingGame/Assets.xcassets
      - path: "RacingGame/Preview Content"
    info:
      path: RacingGame/Info.plist
      properties:
        CFBundleDisplayName: "Hill Climb MP"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarHidden: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.racing.RacingGame
        INFOPLIST_FILE: RacingGame/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"RacingGame/Preview Content"'
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: Combine.framework
