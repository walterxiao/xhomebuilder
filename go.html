<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Go</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0d5c1;font-family:'Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 8px;}
h1{font-size:1.6rem;letter-spacing:6px;color:#d4af37;text-transform:uppercase;margin-bottom:4px;}

/* Setup panel */
#setup{background:#16213e;border:1px solid #2a2a5a;border-radius:8px;padding:28px 32px;width:320px;text-align:center;}
#setup h2{font-size:1rem;letter-spacing:4px;color:#d4af37;text-transform:uppercase;margin-bottom:20px;}
.setup-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.setup-row label{font-size:0.82rem;letter-spacing:2px;color:#7070a0;text-transform:uppercase;}
.seg-ctrl{display:flex;gap:4px;}
.seg-btn{background:#0f0f22;border:1px solid #2a2a5a;color:#e0d5c1;padding:5px 12px;font-size:0.8rem;font-family:inherit;cursor:pointer;border-radius:4px;transition:border-color 0.15s,background 0.15s;}
.seg-btn.active{background:#1e2e54;border-color:#d4af37;color:#d4af37;}
#btn-start{width:100%;margin-top:10px;background:#16213e;border:1px solid #2a2a5a;border-radius:4px;color:#d4af37;padding:10px;font-size:0.95rem;font-family:inherit;cursor:pointer;letter-spacing:2px;}
#btn-start:hover{background:#1e2e54;border-color:#d4af37;}

/* Game area */
#game{display:none;flex-direction:column;align-items:center;width:100%;}
#topbar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;margin-bottom:8px;padding:0 4px;}
#status{font-size:0.88rem;letter-spacing:1px;color:#d4af37;}
#captures{font-size:0.78rem;color:#7070a0;letter-spacing:1px;}
#canvas-wrap{position:relative;touch-action:none;}
canvas{display:block;border-radius:4px;cursor:pointer;}
#ai-thinking{position:absolute;bottom:6px;right:10px;font-size:0.7rem;color:#d4af37;opacity:0;transition:opacity 0.3s;letter-spacing:1px;}
#bottombar{display:flex;gap:12px;margin-top:10px;}
.act-btn{background:#16213e;border:1px solid #2a2a5a;border-radius:4px;color:#e0d5c1;padding:8px 20px;font-size:0.82rem;font-family:inherit;cursor:pointer;letter-spacing:1px;}
.act-btn:hover{border-color:#d4af37;color:#d4af37;}
.act-btn:disabled{opacity:0.35;cursor:default;}

/* Result overlay */
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;align-items:center;justify-content:center;}
#result.show{display:flex;}
.result-card{background:#16213e;border:1px solid #2a2a5a;border-radius:8px;padding:32px 36px;text-align:center;min-width:260px;}
.result-title{font-size:1.2rem;letter-spacing:4px;color:#d4af37;text-transform:uppercase;margin-bottom:16px;}
.result-scores{font-size:0.88rem;color:#e0d5c1;line-height:2;margin-bottom:18px;}
#btn-again{background:#16213e;border:1px solid #2a2a5a;border-radius:4px;color:#d4af37;padding:9px 24px;font-size:0.88rem;font-family:inherit;cursor:pointer;letter-spacing:1px;}
#btn-again:hover{background:#1e2e54;border-color:#d4af37;}
</style>
</head>
<body>
<h1>Go</h1>

<div id="setup">
  <h2>New Game</h2>
  <div class="setup-row">
    <label>Board</label>
    <div class="seg-ctrl" id="size-ctrl">
      <button class="seg-btn active" data-val="9">9×9</button>
      <button class="seg-btn" data-val="13">13×13</button>
      <button class="seg-btn" data-val="19">19×19</button>
    </div>
  </div>
  <div class="setup-row">
    <label>Play as</label>
    <div class="seg-ctrl" id="color-ctrl">
      <button class="seg-btn active" data-val="1">Black</button>
      <button class="seg-btn" data-val="-1">White</button>
    </div>
  </div>
  <div class="setup-row">
    <label>Opponent</label>
    <div class="seg-ctrl" id="opp-ctrl">
      <button class="seg-btn active" data-val="ai">AI</button>
      <button class="seg-btn" data-val="human">Local 2P</button>
    </div>
  </div>
  <button id="btn-start">Start</button>
</div>

<div id="game">
  <div id="topbar">
    <span id="status">Black's turn</span>
    <span id="captures">B cap: 0 &nbsp;|&nbsp; W cap: 0</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="ai-thinking">AI thinking…</div>
  </div>
  <div id="bottombar">
    <button class="act-btn" id="btn-pass">Pass</button>
    <button class="act-btn" id="btn-resign">Resign</button>
    <button class="act-btn" id="btn-menu">Menu</button>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-title" id="result-title">Game Over</div>
    <div class="result-scores" id="result-scores"></div>
    <button id="btn-again">Play Again</button>
  </div>
</div>

<script>
'use strict';
// ── GoEngine ──────────────────────────────────────────────────────────────────
class GoEngine {
  constructor(N, komi = 7.5) {
    this.N = N;
    this.komi = komi;
    this.board = new Int8Array(N * N); // 1=black,-1=white,0=empty
    this.current = 1; // black first
    this.ko = -1;     // forbidden point index, or -1
    this.passCount = 0;
    this.captures = { 1: 0, '-1': 0 }; // captures[color] = stones captured BY that color
    this.over = false;
    this.winner = 0;
    this.resignedBy = 0;
    this.lastMove = -1;
    // precompute adjacency
    this._adj = [];
    for (let i = 0; i < N * N; i++) {
      const r = Math.floor(i / N), c = i % N, nb = [];
      if (r > 0)     nb.push((r-1)*N+c);
      if (r < N-1)   nb.push((r+1)*N+c);
      if (c > 0)     nb.push(r*N+c-1);
      if (c < N-1)   nb.push(r*N+c+1);
      this._adj.push(nb);
    }
  }

  // Returns {group: Set, liberties: Set} for the group containing point p on board b
  groupInfo(p, b) {
    const color = b[p];
    const group = new Set([p]);
    const liberties = new Set();
    const queue = [p];
    while (queue.length) {
      const cur = queue.pop();
      for (const nb of this._adj[cur]) {
        if (b[nb] === 0) { liberties.add(nb); }
        else if (b[nb] === color && !group.has(nb)) { group.add(nb); queue.push(nb); }
      }
    }
    return { group, liberties };
  }

  // Try placing color at point p on board b with ko restriction koPoint.
  // Returns {board, capturedCount, newKo} or null if illegal.
  tryPlace(b, p, color, koPoint) {
    if (b[p] !== 0) return null;
    if (p === koPoint) return null;
    const nb2 = new Int8Array(b);
    nb2[p] = color;
    // capture enemy groups with no liberties
    let captured = 0;
    const opp = -color;
    const capturedPoints = [];
    for (const nb of this._adj[p]) {
      if (nb2[nb] === opp) {
        const { group, liberties } = this.groupInfo(nb, nb2);
        if (liberties.size === 0) {
          for (const gp of group) { nb2[gp] = 0; capturedPoints.push(gp); }
          captured += group.size;
        }
      }
    }
    // suicide check: after captures, if placed stone has no liberties => illegal
    const { liberties: myLibs } = this.groupInfo(p, nb2);
    if (myLibs.size === 0) return null;
    // ko: if exactly 1 captured and board is single-stone capture, store ko point
    let newKo = -1;
    if (captured === 1) {
      // check if placing stone has exactly 1 liberty (which would be the captured point)
      const { liberties: afterLibs } = this.groupInfo(p, nb2);
      if (afterLibs.size === 1) {
        newKo = capturedPoints[0];
      }
    }
    return { board: nb2, capturedCount: captured, newKo };
  }

  move(p) {
    if (this.over) return false;
    const result = this.tryPlace(this.board, p, this.current, this.ko);
    if (!result) return false;
    this.board = result.board;
    this.captures[this.current] += result.capturedCount;
    this.ko = result.newKo;
    this.lastMove = p;
    this.passCount = 0;
    this.current = -this.current;
    return true;
  }

  pass() {
    if (this.over) return;
    this.passCount++;
    this.ko = -1;
    this.lastMove = -1;
    if (this.passCount >= 2) { this.over = true; this._finalScore(); }
    else { this.current = -this.current; }
  }

  resign(color) {
    this.over = true;
    this.resignedBy = color;
    this.winner = -color;
  }

  _finalScore() {
    // Chinese area scoring: count stones + territory by flood-fill
    const { black, white } = this.scoreBoard();
    const wAdj = white + this.komi;
    this.scoreBlack = black;
    this.scoreWhite = wAdj;
    this.winner = black > wAdj ? 1 : -1;
  }

  // Returns {black, white, territory: Int8Array} territory values: 1=black,−1=white,0=neutral
  scoreBoard() {
    const N = this.N, b = this.board;
    const territory = new Int8Array(N * N);
    const visited = new Uint8Array(N * N);
    let black = 0, white = 0;
    for (let i = 0; i < N * N; i++) {
      if (b[i] === 1) black++;
      else if (b[i] === -1) white++;
    }
    // flood-fill empty regions
    for (let start = 0; start < N * N; start++) {
      if (b[start] !== 0 || visited[start]) continue;
      const region = [];
      let touchBlack = false, touchWhite = false;
      const queue = [start];
      visited[start] = 1;
      while (queue.length) {
        const cur = queue.pop();
        region.push(cur);
        for (const nb of this._adj[cur]) {
          if (b[nb] === 1) touchBlack = true;
          else if (b[nb] === -1) touchWhite = true;
          else if (!visited[nb]) { visited[nb] = 1; queue.push(nb); }
        }
      }
      const owner = (touchBlack && !touchWhite) ? 1 : (!touchBlack && touchWhite) ? -1 : 0;
      for (const rp of region) territory[rp] = owner;
      if (owner === 1) black += region.length;
      else if (owner === -1) white += region.length;
    }
    return { black, white, territory };
  }

  legalMoves() {
    const moves = [];
    for (let i = 0; i < this.N * this.N; i++) {
      if (this.board[i] === 0 && this.tryPlace(this.board, i, this.current, this.ko)) {
        moves.push(i);
      }
    }
    return moves;
  }

  clone() {
    const g = new GoEngine(this.N, this.komi);
    g.board = new Int8Array(this.board);
    g.current = this.current;
    g.ko = this.ko;
    g.passCount = this.passCount;
    g.captures = { 1: this.captures[1], '-1': this.captures['-1'] };
    g.over = this.over;
    g.winner = this.winner;
    g.resignedBy = this.resignedBy;
    g.lastMove = this.lastMove;
    return g;
  }
}

// ── MCTS AI ───────────────────────────────────────────────────────────────────
class MCTSNode {
  constructor(parent, move) {
    this.parent = parent;
    this.move = move; // move that led here (-1 = pass)
    this.wins = 0;
    this.visits = 0;
    this.children = null;
    this.untriedMoves = null;
  }
  ucb(totalVisits, C = 1.4) {
    if (this.visits === 0) return Infinity;
    return this.wins / this.visits + C * Math.sqrt(Math.log(totalVisits) / this.visits);
  }
}

function mctsMove(engine, simCount) {
  const root = new MCTSNode(null, null);
  root.untriedMoves = engine.legalMoves();
  if (root.untriedMoves.length === 0) return -1; // pass

  for (let iter = 0; iter < simCount; iter++) {
    let node = root;
    let state = engine.clone();

    // Selection
    while (node.untriedMoves !== null && node.untriedMoves.length === 0
           && node.children && node.children.length > 0) {
      const t = node.visits;
      node = node.children.reduce((best, c) => c.ucb(t) > best.ucb(t) ? c : best);
      if (node.move === -1) state.pass();
      else state.move(node.move);
    }

    // Expansion
    if (!state.over && node.untriedMoves !== null && node.untriedMoves.length > 0) {
      const idx = Math.floor(Math.random() * node.untriedMoves.length);
      const m = node.untriedMoves[idx];
      node.untriedMoves.splice(idx, 1);
      if (node.children === null) node.children = [];
      const child = new MCTSNode(node, m);
      child.untriedMoves = null; // lazy
      node.children.push(child);
      node = child;
      if (m === -1) state.pass();
      else state.move(m);
    }

    // Simulation
    let depth = 0;
    const maxDepth = engine.N * engine.N * 2;
    while (!state.over && depth < maxDepth) {
      const legal = state.legalMoves();
      if (legal.length === 0 || Math.random() < 0.08) { state.pass(); }
      else { state.move(legal[Math.floor(Math.random() * legal.length)]); }
      depth++;
    }
    if (!state.over) { state.pass(); if (!state.over) state.pass(); }

    // Backprop
    const result = state.winner; // 1=black,-1=white
    const aiColor = engine.current;
    let cur = node;
    while (cur !== null) {
      cur.visits++;
      if (result === aiColor) cur.wins++;
      cur = cur.parent;
    }

    // Lazy untried moves
    if (node.untriedMoves === null && !state.over) {
      // don't expand further in this branch this iteration
    }
  }

  if (!root.children || root.children.length === 0) return -1;
  const best = root.children.reduce((b, c) => c.visits > b.visits ? c : b);
  return best.move;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let engine, playerColor, vsAI, N, CELL, PAD, SZ;

function setupCanvas(n) {
  N = n;
  const maxW = Math.min(window.innerWidth - 16, 560);
  SZ = maxW;
  CELL = Math.floor((SZ - 40) / (N - 1));
  PAD = Math.floor((SZ - CELL * (N - 1)) / 2);
  canvas.width = SZ;
  canvas.height = SZ;
}

const HOSHI = {
  9:  [20, 24, 60],
  13: [18, 24, 42, 84, 90, 96, 114, 168],
  19: [60, 66, 72, 174, 180, 186, 288, 294, 300]
};

function drawBoard(showTerritory) {
  const b = engine.board;
  // Wood background
  const woodGrad = ctx.createLinearGradient(0, 0, SZ, SZ);
  woodGrad.addColorStop(0, '#d4953a');
  woodGrad.addColorStop(1, '#b8762a');
  ctx.fillStyle = woodGrad;
  ctx.fillRect(0, 0, SZ, SZ);

  // Grid lines
  ctx.strokeStyle = '#7a5320';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    const x = PAD + i * CELL, y = PAD + i * CELL;
    ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + (N-1)*CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(PAD + (N-1)*CELL, y); ctx.stroke();
  }

  // Hoshi (star points)
  const hs = HOSHI[N] || [];
  ctx.fillStyle = '#7a5320';
  for (const h of hs) {
    const r = Math.floor(h / N), c = h % N;
    ctx.beginPath();
    ctx.arc(PAD + c*CELL, PAD + r*CELL, CELL > 30 ? 3 : 2, 0, Math.PI*2);
    ctx.fill();
  }

  // Territory squares (shown when game over)
  if (showTerritory) {
    const { territory } = engine.scoreBoard();
    const sq = Math.max(4, CELL * 0.3);
    for (let i = 0; i < N * N; i++) {
      if (territory[i] === 0 || engine.board[i] !== 0) continue;
      const r = Math.floor(i / N), c = i % N;
      ctx.fillStyle = territory[i] === 1 ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.55)';
      ctx.fillRect(PAD + c*CELL - sq/2, PAD + r*CELL - sq/2, sq, sq);
    }
  }

  // Stones
  const R = CELL * 0.46;
  for (let i = 0; i < N * N; i++) {
    if (b[i] === 0) continue;
    const r = Math.floor(i / N), c = i % N;
    const cx = PAD + c*CELL, cy = PAD + r*CELL;
    const isLast = (i === engine.lastMove);
    if (b[i] === 1) {
      // Black stone
      const g = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);
      g.addColorStop(0, '#555'); g.addColorStop(1, '#111');
      ctx.fillStyle = g;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      if (isLast) { ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,R*0.35,0,Math.PI*2); ctx.stroke(); }
    } else {
      // White stone
      const g = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);
      g.addColorStop(0, '#fff'); g.addColorStop(1, '#ccc');
      ctx.fillStyle = g;
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.stroke();
      if (isLast) { ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,R*0.35,0,Math.PI*2); ctx.stroke(); }
    }
  }

  // Coordinate labels (only for N<=13 and cell large enough)
  if (CELL >= 28) {
    ctx.fillStyle = '#7a5320';
    ctx.font = `${Math.max(9, CELL * 0.28)}px Georgia`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const letters = 'ABCDEFGHJKLMNOPQRST'; // no I
    for (let i = 0; i < N; i++) {
      const x = PAD + i * CELL;
      ctx.fillText(letters[i], x, PAD * 0.45);
      ctx.fillText(letters[i], x, SZ - PAD * 0.45);
      ctx.fillText(N - i, PAD * 0.45, PAD + i * CELL);
      ctx.fillText(N - i, SZ - PAD * 0.45, PAD + i * CELL);
    }
  }
}

function updateStatus() {
  const statusEl = document.getElementById('status');
  const capEl = document.getElementById('captures');
  capEl.textContent = `B cap: ${engine.captures[1]}  |  W cap: ${engine.captures[-1]}`;
  if (engine.over) {
    if (engine.resignedBy) {
      statusEl.textContent = (engine.resignedBy === 1 ? 'Black' : 'White') + ' resigned';
    } else {
      statusEl.textContent = 'Game over';
    }
  } else {
    const whose = engine.current === 1 ? 'Black' : 'White';
    const isYou = !vsAI || engine.current === playerColor;
    statusEl.textContent = whose + "'s turn" + (isYou ? ' (you)' : '');
  }
}

function render(showTerritory) {
  drawBoard(showTerritory || engine.over);
  updateStatus();
}

// ── Input ─────────────────────────────────────────────────────────────────────
function canvasClick(px, py) {
  if (engine.over) return;
  if (vsAI && engine.current !== playerColor) return;
  const c = Math.round((px - PAD) / CELL);
  const r = Math.round((py - PAD) / CELL);
  if (c < 0 || c >= N || r < 0 || r >= N) return;
  const idx = r * N + c;
  if (engine.move(idx)) {
    render(false);
    if (vsAI && !engine.over) scheduleAI();
  }
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  canvasClick(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  canvasClick(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

// ── AI scheduling ─────────────────────────────────────────────────────────────
const simCounts = { 9: 300, 13: 100, 19: 50 };

function scheduleAI() {
  if (engine.over || engine.current === playerColor) return;
  document.getElementById('ai-thinking').style.opacity = '1';
  setTimeout(() => {
    const sc = simCounts[N] || 100;
    const m = mctsMove(engine, sc);
    document.getElementById('ai-thinking').style.opacity = '0';
    if (m === -1) engine.pass();
    else engine.move(m);
    render(false);
    if (engine.over) showResult();
  }, 80);
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function showResult() {
  render(true);
  const titleEl = document.getElementById('result-title');
  const scoresEl = document.getElementById('result-scores');
  if (engine.resignedBy) {
    const res = engine.resignedBy === 1 ? 'White wins' : 'Black wins';
    titleEl.textContent = res;
    scoresEl.innerHTML = (engine.resignedBy === 1 ? 'Black' : 'White') + ' resigned.';
  } else {
    const { black, white } = engine.scoreBoard();
    const wAdj = white + engine.komi;
    const winner = black > wAdj ? 'Black wins' : 'White wins';
    titleEl.textContent = winner;
    scoresEl.innerHTML =
      `Black: ${black} pts<br>White: ${white} + ${engine.komi} komi = ${wAdj} pts`;
  }
  document.getElementById('result').classList.add('show');
}

document.getElementById('btn-pass').addEventListener('click', () => {
  if (engine.over) return;
  if (vsAI && engine.current !== playerColor) return;
  engine.pass();
  render(false);
  if (engine.over) { showResult(); return; }
  if (vsAI) scheduleAI();
});

document.getElementById('btn-resign').addEventListener('click', () => {
  if (engine.over) return;
  if (vsAI && engine.current !== playerColor) return;
  engine.resign(engine.current);
  render(false);
  showResult();
});

document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  document.getElementById('result').classList.remove('show');
});

document.getElementById('btn-again').addEventListener('click', startGame);

// ── Segment controls ──────────────────────────────────────────────────────────
for (const ctrlId of ['size-ctrl','color-ctrl','opp-ctrl']) {
  document.getElementById(ctrlId).addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    btn.closest('.seg-ctrl').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
}

function getVal(ctrlId) {
  return document.querySelector(`#${ctrlId} .seg-btn.active`).dataset.val;
}

function startGame() {
  const n = parseInt(getVal('size-ctrl'));
  playerColor = parseInt(getVal('color-ctrl'));
  vsAI = getVal('opp-ctrl') === 'ai';

  setupCanvas(n);
  engine = new GoEngine(n, 7.5);

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('result').classList.remove('show');

  render(false);

  // If player chose white and vsAI, AI plays first (black)
  if (vsAI && engine.current !== playerColor) scheduleAI();
}

document.getElementById('btn-start').addEventListener('click', startGame);
</script>
</body>
</html>
