<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hill Racer – Game Hub</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  font-family: 'Georgia', serif;
  color: #e0d5c1;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

canvas {
  display: block;
  background: #87ceeb;
  touch-action: none;
}

/* ── Overlay panels ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
.overlay.hidden { display: none; }

.panel {
  background: #16213e;
  border: 1px solid #2a2a5a;
  border-radius: 10px;
  padding: 32px 36px;
  text-align: center;
  width: min(360px, 90vw);
}

.panel h2 {
  font-size: 1.4rem;
  letter-spacing: 4px;
  color: #d4af37;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.panel .sub {
  font-size: 0.78rem;
  color: #555577;
  letter-spacing: 2px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.panel input {
  width: 100%;
  background: #0f0f22;
  border: 1px solid #2a2a5a;
  border-radius: 4px;
  color: #e0d5c1;
  padding: 8px 12px;
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  margin-bottom: 10px;
}
.panel input:focus { border-color: #d4af37; }

.btn {
  display: block;
  width: 100%;
  background: #16213e;
  border: 1px solid #2a2a5a;
  border-radius: 4px;
  color: #d4af37;
  padding: 10px;
  font-size: 0.9rem;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 1px;
  margin-top: 6px;
}
.btn:hover { border-color: #d4af37; background: #1e2e54; }
.btn.primary { background: #1e3a1e; border-color: #4caf50; color: #4caf50; }
.btn.primary:hover { background: #265026; }

.player-list {
  margin: 12px 0;
  font-size: 0.82rem;
  color: #7070a0;
  min-height: 40px;
}
.player-list span { display: inline-block; margin: 3px 6px; padding: 3px 8px;
  border-radius: 4px; font-size: 0.8rem; }

/* ── HUD ── */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 6px 10px;
  pointer-events: none;
  z-index: 5;
}
#hud.hidden { display: none; }

.hud-left, .hud-right {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hud-pill {
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 0.75rem;
  letter-spacing: 1px;
  color: #e0d5c1;
  white-space: nowrap;
}
.hud-pill .label { color: #777799; margin-right: 4px; }

/* ── Countdown ── */
#countdown-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 8;
  pointer-events: none;
}
#countdown-overlay.hidden { display: none; }
#countdown-num {
  font-size: 8rem;
  font-weight: bold;
  color: #d4af37;
  text-shadow: 0 0 40px rgba(212,175,55,0.7);
  opacity: 1;
  transition: opacity 0.2s;
}

/* ── Mobile controls ── */
#mobile-controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: none;
  justify-content: space-between;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  z-index: 6;
  pointer-events: none;
}
#mobile-controls.visible { display: flex; }

.ctrl-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid rgba(212,175,55,0.5);
  background: rgba(0,0,0,0.45);
  color: #d4af37;
  font-size: 1.6rem;
  display: flex; align-items: center; justify-content: center;
  pointer-events: all;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.ctrl-btn:active, .ctrl-btn.held { background: rgba(212,175,55,0.25); border-color: #d4af37; }

/* ── Landscape prompt ── */
#landscape-prompt {
  position: fixed; inset: 0;
  background: #1a1a2e;
  z-index: 100;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 24px;
}
#landscape-prompt .icon { font-size: 4rem; }
#landscape-prompt p { color: #7070a0; font-size: 0.9rem; letter-spacing: 1px; }

/* ── Power-up toast ── */
#powerup-toast {
  position: fixed;
  top: 50px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 0.88rem;
  color: #d4af37;
  z-index: 9;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

/* ── Results ── */
.results-table { width: 100%; margin: 12px 0; border-collapse: collapse; }
.results-table td { padding: 6px 8px; font-size: 0.85rem; }
.results-table tr:first-child td { color: #d4af37; font-size: 1rem; }
.rank-medal { font-size: 1.1rem; }
</style>
</head>
<body>

<!-- Landscape prompt (portrait mobile) -->
<div id="landscape-prompt">
  <div class="icon">📱↔️</div>
  <div style="font-size:1.1rem;color:#d4af37;letter-spacing:3px;text-transform:uppercase">Rotate Device</div>
  <p>Please rotate your phone to landscape mode to play Hill Racer</p>
</div>

<!-- Name entry overlay -->
<div class="overlay" id="overlay-name">
  <div class="panel">
    <h2>Hill Racer</h2>
    <div class="sub">Drive smart, survive the hills</div>
    <input id="inp-name" type="text" maxlength="24" placeholder="Your name" autocomplete="off">
    <button class="btn primary" id="btn-enter">Enter Lobby</button>
    <button class="btn" id="btn-back" onclick="location.href='/'">← Back to Hub</button>
  </div>
</div>

<!-- Lobby overlay -->
<div class="overlay hidden" id="overlay-lobby">
  <div class="panel">
    <h2>Lobby</h2>
    <div class="sub" id="lobby-sub">Waiting for players…</div>
    <div class="player-list" id="player-list"></div>
    <button class="btn primary hidden" id="btn-start">Start Race</button>
    <button class="btn" id="btn-back2" onclick="location.href='/'">← Back to Hub</button>
  </div>
</div>

<!-- Results overlay -->
<div class="overlay hidden" id="overlay-results">
  <div class="panel">
    <h2>Race Over</h2>
    <table class="results-table" id="results-table"></table>
    <button class="btn primary hidden" id="btn-rematch">Rematch</button>
    <button class="btn" onclick="location.href='/'">← Back to Hub</button>
  </div>
</div>

<!-- Countdown -->
<div id="countdown-overlay" class="hidden">
  <div id="countdown-num">3</div>
</div>

<!-- Power-up toast -->
<div id="powerup-toast"></div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="hud-pill"><span class="label">Speed</span><span id="hud-speed">0</span></div>
    <div class="hud-pill" id="hud-powerup" style="display:none"></div>
  </div>
  <div class="hud-right">
    <div class="hud-pill"><span class="label">Pos</span><span id="hud-pos">–</span></div>
    <div class="hud-pill"><span class="label">Dist</span><span id="hud-dist">0%</span></div>
  </div>
</div>

<!-- Mobile buttons -->
<div id="mobile-controls">
  <div class="ctrl-btn" id="btn-gas">⛽</div>
  <div class="ctrl-btn" id="btn-brake">🛑</div>
</div>

<canvas id="c"></canvas>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Mobile / orientation ──────────────────────────────────────────────────────
const landscapePrompt = document.getElementById('landscape-prompt');
function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 700; }
function checkOrientation() {
  if (!isMobile()) { landscapePrompt.style.display = 'none'; return; }
  const portrait = window.innerHeight > window.innerWidth;
  landscapePrompt.style.display = portrait ? 'flex' : 'none';
  if (!portrait && gameState && gameState.started) {
    document.getElementById('mobile-controls').classList.add('visible');
  }
}
checkOrientation();
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null;
function wsSend(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ── State ─────────────────────────────────────────────────────────────────────
let myName   = localStorage.getItem('phub_name') || '';
let myIdx    = -1;
let isObs    = false;
let sessId   = null;
let gameState = null;   // { started, heights, trackLength, terrainSeg, powerups, players, cars, oilSlicks }
let prevCars  = null;
let lastTick  = 0;
const TICK_MS = 50;

// Input state
const keys = { throttle: false, brake: false };
let inputDirty = false;

// ── Terrain helpers ───────────────────────────────────────────────────────────
function terrainY(worldX) {
  const { heights, terrainSeg } = gameState;
  const segF = worldX / terrainSeg;
  const seg  = Math.floor(segF);
  const t    = segF - seg;
  const n    = heights.length;
  const i0   = Math.max(0, Math.min(n - 1, seg));
  const i1   = Math.min(n - 1, seg + 1);
  return heights[i0] * (1 - t) + heights[i1] * t;
}

// ── Camera ────────────────────────────────────────────────────────────────────
let camX = 0;
const CAM_LEAD = 0.35; // fraction of screen width ahead of car

function updateCamera(now) {
  if (!gameState || !gameState.cars) return;
  let targetX;
  if (myIdx >= 0 && !isObs && gameState.cars[myIdx]) {
    targetX = gameState.cars[myIdx].x - canvas.width * 0.3;
  } else {
    // Observer: follow leader
    const leader = [...gameState.cars].sort((a, b) => b.x - a.x)[0];
    if (leader) targetX = leader.x - canvas.width * 0.5;
    else targetX = camX;
  }
  camX += (targetX - camX) * 0.12;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const POWERUP_ICONS = { nitro: '⚡', shield: '🛡', oil: '🛢', repair: '🔧' };
const MEDAL = ['🥇', '🥈', '🥉', ''];

function render(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!gameState || !gameState.heights) return;

  const H = canvas.height;
  const W = canvas.width;

  // ── Sky gradient ──
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  sky.addColorStop(0, '#1a6090');
  sky.addColorStop(1, '#87ceeb');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ── Parallax hills (background) ──
  drawBgHills(now);

  // ── Terrain ──
  drawTerrain();

  // ── Oil slicks ──
  if (gameState.oilSlicks) {
    for (const oil of gameState.oilSlicks) {
      const sx = oil.x - camX;
      const sy = worldToScreenY(terrainY(oil.x));
      ctx.save();
      ctx.globalAlpha = 0.65;
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(sx, sy - 4, 35, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      // Rainbow sheen
      const grad = ctx.createRadialGradient(sx, sy - 4, 0, sx, sy - 4, 35);
      grad.addColorStop(0, 'rgba(0,200,255,0.3)');
      grad.addColorStop(0.5, 'rgba(200,0,200,0.2)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(sx, sy - 4, 35, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Power-ups ──
  if (gameState.powerups) {
    for (const pu of gameState.powerups) {
      if (pu.taken) continue;
      const sx = pu.x - camX;
      if (sx < -60 || sx > W + 60) continue;
      const sy = worldToScreenY(pu.y);
      const bob = Math.sin(now * 0.003 + pu.x * 0.01) * 5;
      ctx.save();
      ctx.shadowColor = '#d4af37';
      ctx.shadowBlur = 12;
      ctx.fillStyle = 'rgba(212,175,55,0.18)';
      ctx.beginPath();
      ctx.arc(sx, sy - 22 + bob, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(POWERUP_ICONS[pu.type] || '?', sx, sy - 22 + bob);
      ctx.restore();
    }
  }

  // ── Finish line ──
  if (gameState.trackLength) {
    const fx = gameState.trackLength - camX;
    if (fx > -20 && fx < W + 20) {
      const fy = worldToScreenY(terrainY(gameState.trackLength));
      // Checkerboard flag pole
      ctx.fillStyle = '#888';
      ctx.fillRect(fx - 2, fy - 100, 4, 100);
      const sqSize = 12;
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 4; col++) {
          ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#000';
          ctx.fillRect(fx + col * sqSize, fy - 100 + row * sqSize, sqSize, sqSize);
        }
      }
    }
  }

  // ── Cars ──
  const carsToRender = interpolateCars(now);
  for (let i = 0; i < carsToRender.length; i++) {
    const car = carsToRender[i];
    const info = gameState.players[i];
    if (!info) continue;
    drawCar(car, info.color, info.name, i === myIdx);
  }

  // ── HUD ──
  updateHUD(carsToRender);
}

function worldToScreenY(worldY) {
  // terrain Y is offset from baseline; baseline is at canvas center
  const baseline = canvas.height * 0.62;
  return baseline - worldY;
}

function drawBgHills(now) {
  const W = canvas.width, H = canvas.height;
  // Two layers of procedural hills
  for (let layer = 0; layer < 2; layer++) {
    const parallax = 0.15 + layer * 0.1;
    const offsetX = camX * parallax;
    const amplitude = 40 + layer * 25;
    const freq = 0.0025 - layer * 0.0005;
    const baseY = H * (0.55 - layer * 0.08);

    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) {
      const y = baseY - Math.sin((x + offsetX) * freq) * amplitude
                      - Math.sin((x + offsetX) * freq * 2.3 + 1) * amplitude * 0.4;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = layer === 0 ? '#2d5a27' : '#3a7a32';
    ctx.fill();
  }
}

function drawTerrain() {
  const W = canvas.width, H = canvas.height;
  const { heights, terrainSeg, trackLength } = gameState;

  // Road surface
  ctx.beginPath();
  const startSeg = Math.max(0, Math.floor(camX / terrainSeg) - 1);
  const endSeg   = Math.min(heights.length - 1, Math.ceil((camX + W) / terrainSeg) + 1);

  let first = true;
  for (let i = startSeg; i <= endSeg; i++) {
    const wx = i * terrainSeg;
    const sx = wx - camX;
    const sy = worldToScreenY(heights[i]);
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.lineTo((endSeg * terrainSeg) - camX, H + 20);
  ctx.lineTo((startSeg * terrainSeg) - camX, H + 20);
  ctx.closePath();

  // Grass fill
  const grad = ctx.createLinearGradient(0, H * 0.5, 0, H);
  grad.addColorStop(0, '#5a8a3a');
  grad.addColorStop(0.08, '#4a7a2a');
  grad.addColorStop(1, '#2a4a1a');
  ctx.fillStyle = grad;
  ctx.fill();

  // Road stripe on top
  ctx.strokeStyle = '#6aaa4a';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Dashed center line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,200,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 16]);
  ctx.beginPath();
  first = true;
  for (let i = startSeg; i <= endSeg; i++) {
    const wx = i * terrainSeg;
    const sx = wx - camX;
    const sy = worldToScreenY(heights[i]) - 5;
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  ctx.restore();
}

function drawCar(car, color, name, isMe) {
  const sx = car.x - camX;
  const sy = worldToScreenY(car.y);
  if (sx < -120 || sx > canvas.width + 120) return;

  ctx.save();
  ctx.translate(sx, sy);

  if (car.flipped) {
    ctx.rotate(Math.PI); // upside down
  } else {
    ctx.rotate(car.angle);
  }

  const W = 52, H = 24;
  const x0 = -W / 2, y0 = -H;

  // Shadow
  ctx.save();
  ctx.rotate(-car.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 4, W * 0.45, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x0, y0, W, H, 6);
  ctx.fill();

  // Roof / cabin
  ctx.fillStyle = lighten(color, 30);
  ctx.beginPath();
  ctx.roundRect(x0 + 10, y0 - 13, W - 18, 14, 4);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(180,230,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(x0 + 14, y0 - 11, W - 30, 11, 3);
  ctx.fill();

  // Wheels
  drawWheel(ctx, x0 + 10, 4, 8);
  drawWheel(ctx, x0 + W - 10, 4, 8);

  // Nitro flames
  if (car.nitroCooldown > 0) {
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.ellipse(x0 - 8, y0 + H/2, 10, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffee00';
    ctx.beginPath();
    ctx.ellipse(x0 - 8, y0 + H/2, 6, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Shield glow
  if (car.shield) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#00ccff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, y0 + H/2, W * 0.6, H * 0.9, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  // Name label
  ctx.save();
  ctx.font = isMe ? 'bold 11px Georgia' : '10px Georgia';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const labelY = sy - (car.flipped ? -40 : 42);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  const tw = ctx.measureText(name).width;
  ctx.fillRect(sx - tw/2 - 3, labelY - 13, tw + 6, 14);
  ctx.fillStyle = isMe ? '#d4af37' : '#e0d5c1';
  ctx.fillText(name, sx, labelY);
  ctx.restore();
}

function drawWheel(ctx, x, y, r) {
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amt);
  const g = Math.min(255, ((n >> 8) & 0xff) + amt);
  const b = Math.min(255, (n & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

function interpolateCars(now) {
  if (!gameState.cars) return [];
  if (!prevCars || !lastTick) return gameState.cars;
  const t = Math.min(1, (now - lastTick) / TICK_MS);
  return gameState.cars.map((car, i) => {
    const prev = prevCars[i];
    if (!prev) return car;
    return {
      ...car,
      x: prev.x + (car.x - prev.x) * t,
      y: prev.y + (car.y - prev.y) * t,
      angle: prev.angle + (car.angle - prev.angle) * t,
    };
  });
}

function updateHUD(cars) {
  if (!gameState || !gameState.started || myIdx < 0) return;
  const car = cars[myIdx];
  if (!car) return;

  const speed = Math.abs(car.speed);
  document.getElementById('hud-speed').textContent = Math.round(speed * 10);
  document.getElementById('hud-dist').textContent =
    Math.round((car.x / gameState.trackLength) * 100) + '%';

  // Position
  const sorted = [...cars].sort((a, b) => b.x - a.x);
  const pos = sorted.findIndex(c => c === car) + 1;
  const posEl = document.getElementById('hud-pos');
  posEl.textContent = pos + ' / ' + cars.length;

  // Power-up indicator
  const pupEl = document.getElementById('hud-powerup');
  if (car.nitroCooldown > 0) {
    pupEl.style.display = '';
    pupEl.textContent = '⚡ Nitro ' + Math.ceil(car.nitroCooldown * 50 / 1000) + 's';
  } else if (car.shield) {
    pupEl.style.display = '';
    pupEl.textContent = '🛡 Shield';
  } else {
    pupEl.style.display = 'none';
  }
}

// ── Animation loop ────────────────────────────────────────────────────────────
function loop(now) {
  updateCamera(now);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────────
function sendInput() {
  wsSend({ type: 'input', throttle: keys.throttle, brake: keys.brake });
}

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    keys.throttle = true; sendInput();
  }
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    keys.brake = true; sendInput();
  }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    keys.throttle = false; sendInput();
  }
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    keys.brake = false; sendInput();
  }
});

// Mobile buttons
function setupMobileBtn(id, key) {
  const el = document.getElementById(id);
  function down(e) { e.preventDefault(); keys[key] = true; el.classList.add('held'); sendInput(); }
  function up(e)   { e.preventDefault(); keys[key] = false; el.classList.remove('held'); sendInput(); }
  el.addEventListener('touchstart', down, { passive: false });
  el.addEventListener('touchend',   up,   { passive: false });
  el.addEventListener('touchcancel', up,  { passive: false });
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup',   up);
}
setupMobileBtn('btn-gas', 'throttle');
setupMobileBtn('btn-brake', 'brake');

// ── WebSocket messages ────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/racing`);

  ws.onopen = () => {
    wsSend({ type: 'join', name: myName });
  };

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMsg(msg);
  };

  ws.onclose = () => {
    setTimeout(connect, 2000);
  };
}

function handleMsg(msg) {
  switch (msg.type) {

    case 'joined': {
      myIdx  = msg.idx;
      sessId = msg.sessId;
      isObs  = false;
      showLobby(msg.players, true);
      break;
    }

    case 'joined_obs': {
      isObs  = true;
      sessId = msg.sessId;
      showLobby(msg.players, false);
      if (msg.started) hideLobby();
      break;
    }

    case 'player_joined': {
      updatePlayerList(msg.players);
      break;
    }

    case 'race_start': {
      gameState = {
        started: true,
        heights: msg.heights,
        trackLength: msg.trackLength,
        terrainSeg: msg.terrainSeg,
        powerups: msg.powerups,
        players: msg.players,
        cars: msg.players.map(p => ({ idx: p.idx, x: p.x, y: p.y, angle: 0,
          speed: 0, flipped: false, flipTimer: 0, finished: false,
          nitroCooldown: 0, shield: false })),
        oilSlicks: [],
      };
      camX = gameState.cars[isObs ? 0 : myIdx]?.x - canvas.width * 0.3 || 0;
      hideLobby();
      document.getElementById('hud').classList.remove('hidden');
      if (isMobile() && !landscapePrompt.style.display !== 'flex') {
        document.getElementById('mobile-controls').classList.add('visible');
      }
      startCountdown(3);
      break;
    }

    case 'race_countdown': {
      // Handled by local countdown started at race_start
      break;
    }

    case 'race_go': {
      endCountdown();
      break;
    }

    case 'race_tick': {
      prevCars  = gameState.cars ? gameState.cars.map(c => ({ ...c })) : null;
      lastTick  = performance.now();
      // Merge car state
      for (const c of msg.cars) {
        if (gameState.cars[c.idx]) Object.assign(gameState.cars[c.idx], c);
      }
      // Update power-ups
      for (const pu of msg.powerups) {
        const gp = gameState.powerups.find(p => p.id === pu.id);
        if (gp) gp.taken = pu.taken;
      }
      gameState.oilSlicks = msg.oilSlicks || [];
      break;
    }

    case 'powerup_got': {
      showPowerupToast(msg.ptype);
      break;
    }

    case 'race_end': {
      showResults(msg.results);
      break;
    }

    case 'rematch_ready': {
      document.getElementById('overlay-results').classList.add('hidden');
      gameState = null;
      document.getElementById('hud').classList.add('hidden');
      document.getElementById('mobile-controls').classList.remove('visible');
      showLobby(msg.players, myIdx === 0);
      break;
    }
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLobby(players, canStart) {
  document.getElementById('overlay-name').classList.add('hidden');
  document.getElementById('overlay-lobby').classList.remove('hidden');
  updatePlayerList(players);
  const btn = document.getElementById('btn-start');
  if (canStart && !isObs) btn.classList.remove('hidden');
  else btn.classList.add('hidden');
}

function hideLobby() {
  document.getElementById('overlay-lobby').classList.add('hidden');
}

function updatePlayerList(players) {
  const el = document.getElementById('player-list');
  const COLORS = ['#e63946','#2196f3','#4caf50','#ff9800'];
  el.innerHTML = players.map((p, i) =>
    `<span style="background:${COLORS[i]}22;border:1px solid ${COLORS[i]}44;color:${COLORS[i]}">${esc(p.name)}</span>`
  ).join('');
  const sub = document.getElementById('lobby-sub');
  sub.textContent = players.length >= 2
    ? `${players.length} player${players.length > 1 ? 's' : ''} ready`
    : 'Waiting for players…';
}

let countdownTimer = null;
function startCountdown(secs) {
  const overlay = document.getElementById('countdown-overlay');
  const num     = document.getElementById('countdown-num');
  overlay.classList.remove('hidden');
  let n = secs;
  num.textContent = n;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(countdownTimer);
      num.textContent = 'GO!';
      num.style.color = '#4caf50';
      setTimeout(() => {
        overlay.classList.add('hidden');
        num.style.color = '#d4af37';
      }, 700);
    } else {
      num.textContent = n;
    }
  }, 1000);
}

function endCountdown() {
  // Server confirmed go — let local timer finish naturally
}

function showPowerupToast(type) {
  const toast = document.getElementById('powerup-toast');
  const labels = { nitro: '⚡ NITRO!', shield: '🛡 SHIELD!', oil: '🛢 OIL SLICK!', repair: '🔧 REPAIR!' };
  toast.textContent = labels[type] || type;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 1800);
}

function showResults(results) {
  const tbl = document.getElementById('results-table');
  tbl.innerHTML = results.map((r, i) => {
    const medal = ['🥇','🥈','🥉'][i] || `#${r.rank}`;
    const time  = r.finishTime
      ? `${(r.finishTime / 1000).toFixed(2)}s`
      : 'DNF';
    return `<tr><td>${medal}</td>
      <td style="color:${['#e63946','#2196f3','#4caf50','#ff9800'][i] || '#e0d5c1'}">${esc(r.name)}</td>
      <td style="color:#7070a0">${time}</td></tr>`;
  }).join('');

  document.getElementById('overlay-results').classList.remove('hidden');
  const rematchBtn = document.getElementById('btn-rematch');
  if (!isObs && myIdx === 0) {
    rematchBtn.classList.remove('hidden');
    rematchBtn.onclick = () => wsSend({ type: 'rematch' });
  } else {
    rematchBtn.classList.add('hidden');
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Name entry ────────────────────────────────────────────────────────────────
const inpName = document.getElementById('inp-name');
if (myName) inpName.value = myName;

document.getElementById('btn-enter').onclick = enterLobby;
inpName.addEventListener('keydown', e => { if (e.key === 'Enter') enterLobby(); });

function enterLobby() {
  const v = inpName.value.trim();
  if (!v) { inpName.focus(); return; }
  myName = v;
  localStorage.setItem('phub_name', v);
  connect();
}

// Also auto-connect if name already known
if (myName) {
  setTimeout(connect, 0);
} else {
  setTimeout(() => inpName.focus(), 50);
}

// Start button
document.getElementById('btn-start').onclick = () => wsSend({ type: 'start' });
</script>
