<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake · Game Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1a0d;color:#e0d5c1;font-family:'Segoe UI',Georgia,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;flex-direction:column;align-items:center;width:100%;padding:24px 16px;gap:16px}
.screen.active{display:flex}
/* ── Title ── */
.page-title{font-size:2rem;letter-spacing:6px;color:#44ee88;text-transform:uppercase;text-shadow:0 0 20px rgba(68,238,136,.4)}
.page-sub{font-size:.8rem;color:#446644;letter-spacing:3px;text-transform:uppercase}
/* ── Lobby box ── */
.lobby-box{background:#0f1f0f;border:1px solid #2a4a2a;border-radius:10px;padding:32px 40px;width:min(100%,420px);display:flex;flex-direction:column;gap:12px}
.lb-label{font-size:.72rem;letter-spacing:2px;color:#446644;text-transform:uppercase;margin-bottom:2px}
.lb-input{width:100%;padding:10px 12px;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px;color:#e0d5c1;font-size:.95rem;font-family:inherit;outline:none}
.lb-input:focus{border-color:#44ee88}
.lb-err{min-height:16px;font-size:.8rem;color:#ee4444;text-align:center}
/* ── Buttons ── */
.btn-green{width:100%;padding:12px;background:#44ee88;color:#0a1a0a;border:none;border-radius:6px;font-size:.95rem;font-family:inherit;font-weight:bold;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .15s}
.btn-green:hover{background:#66ffaa}
.btn-ghost{width:100%;padding:10px;background:transparent;color:#446644;border:1px solid #2a4a2a;border-radius:6px;font-size:.85rem;font-family:inherit;letter-spacing:1px;cursor:pointer;transition:border-color .15s,color .15s}
.btn-ghost:hover{border-color:#44ee88;color:#44ee88}
.back-link{font-size:.75rem;color:#334433;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:color .2s}
.back-link:hover{color:#44ee88}
/* ── Std sessions ── */
.std-sess-section{width:100%}
.std-sess-hdr{font-size:.72rem;letter-spacing:2px;color:#446644;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.std-sess-badge{background:#0a1a0a;color:#446644;border:1px solid #2a4a2a;border-radius:10px;padding:1px 7px;font-size:.68rem}
.std-sess-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.std-sess-row{display:flex;align-items:center;gap:8px;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px;padding:9px 12px}
.std-sess-info{flex:1}
.std-sess-host{font-size:.85rem;color:#e0d5c1}
.std-sess-meta{font-size:.72rem;color:#446644;margin-top:2px}
.std-no-sess{padding:14px;text-align:center;font-size:.8rem;color:#334433;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px}
.std-btn-join{padding:5px 12px;background:#0f2a0f;border:1px solid #3a7a3a;border-radius:4px;color:#88cc88;font-size:.78rem;cursor:pointer;font-family:inherit}
.std-btn-join:hover{background:#1a3a1a}
.std-btn-obs{padding:5px 12px;background:#0a0a1a;border:1px solid #3a3a6a;border-radius:4px;color:#8080c0;font-size:.78rem;cursor:pointer;font-family:inherit}
.std-btn-obs:hover{background:#1a1a2a}
/* ── Waiting room ── */
.wait-box{background:#0f1f0f;border:1px solid #2a4a2a;border-radius:10px;padding:28px 36px;width:min(100%,420px);text-align:center}
.wait-title{font-size:.72rem;letter-spacing:2px;color:#446644;text-transform:uppercase;margin-bottom:6px}
.sess-id-val{font-size:2rem;letter-spacing:8px;color:#44ee88;cursor:pointer;user-select:all;margin-bottom:4px;display:block}
.sess-id-val:hover{text-decoration:underline}
.copy-hint{font-size:.7rem;color:#334433;letter-spacing:1px;margin-bottom:18px}
.wait-players{margin:14px 0;display:flex;flex-direction:column;gap:8px}
.wait-player{display:flex;align-items:center;gap:10px;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px;padding:9px 14px;font-size:.9rem}
.wait-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.wait-crown{color:#d4af37;font-size:.8rem}
.wait-msg{font-size:.82rem;color:#446644;margin-top:8px}
/* ── Game screen ── */
#screen-game{padding:0;gap:0;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#060e06}
#score-bar{flex-shrink:0;background:#0a140a;border-bottom:1px solid #1a3a1a;display:flex;align-items:center;gap:4px;padding:6px 12px;flex-wrap:wrap;min-height:44px}
.score-chip{display:flex;align-items:center;gap:6px;background:#0d1a0d;border-radius:20px;padding:4px 10px;border:1px solid #1a3a1a;font-size:.82rem}
.sc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sc-name{color:#c0d0c0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-val{color:#44ee88;font-weight:bold;min-width:20px;text-align:right}
.score-chip.dead{opacity:.4}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;position:relative}
#canvas{display:block;image-rendering:pixelated}
/* ── Mobile controls ── */
#dpad{flex-shrink:0;display:grid;grid-template-areas:". up ." "left . right" ". down .";gap:4px;padding:8px 0 max(8px,env(safe-area-inset-bottom));background:#0a140a;border-top:1px solid #1a3a1a;justify-content:center}
.dpad-btn{width:56px;height:50px;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#44ee88;user-select:none;-webkit-user-select:none;touch-action:none}
.dpad-btn:active,.dpad-btn.pressed{background:#2a4a2a}
#dpad-up{grid-area:up}#dpad-left{grid-area:left}#dpad-right{grid-area:right}#dpad-down{grid-area:down}
@media(min-width:600px){#dpad{display:none}}
/* ── Chat ── */
#chat-fab{position:fixed;bottom:130px;right:12px;width:42px;height:42px;border-radius:50%;background:#1a2a1a;color:#44ee88;font-size:1.1rem;border:1px solid #2a4a2a;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
#chat-fab.notif{background:#44ee88;color:#0a1a0a;animation:pulse .5s ease-in-out 2}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@media(min-width:600px){#chat-fab{bottom:16px}}
#chat-panel{position:fixed;bottom:0;right:0;width:min(100vw,300px);height:240px;background:#0f1f0f;border-top:2px solid #44ee88;border-left:2px solid #44ee88;border-radius:12px 0 0 0;display:none;flex-direction:column;z-index:49}
#chat-panel.open{display:flex}
#chat-close{padding:7px 12px;font-size:.78rem;color:#446644;cursor:pointer;text-align:right;border-bottom:1px solid #1a3a1a}
#chat-close:hover{color:#44ee88}
#chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.cmsg{font-size:.8rem;color:#c0d0c0;line-height:1.4;word-break:break-word}
.cmsg-name{font-weight:bold}
#chat-row{display:flex;gap:4px;padding:7px 8px;border-top:1px solid #1a3a1a}
#chat-inp{flex:1;background:#0a140a;border:1px solid #2a4a2a;border-radius:4px;color:#e0d5c1;padding:5px 8px;font-size:.82rem;font-family:inherit;outline:none}
#chat-inp:focus{border-color:#44ee88}
#chat-send{background:#44ee88;color:#0a1a0a;border:none;border-radius:4px;padding:5px 10px;font-size:.82rem;cursor:pointer;font-weight:bold}
/* ── Game over ── */
#over-box{background:#0f1f0f;border:1px solid #2a4a2a;border-radius:12px;padding:36px 44px;text-align:center;max-width:360px;width:90vw}
#over-title{font-size:1.4rem;letter-spacing:4px;color:#44ee88;margin-bottom:6px}
#over-winner{font-size:.9rem;color:#c0d0c0;margin-bottom:20px}
#over-scores{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.over-row{display:flex;align-items:center;gap:10px;background:#0a140a;border-radius:4px;padding:9px 14px}
.over-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.over-name{flex:1;text-align:left;font-size:.9rem;color:#c0d0c0}
.over-score{font-size:.9rem;color:#44ee88;font-weight:bold}
.over-row.first .over-name{color:#d4af37}
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="screen-lobby" class="screen active">
  <div class="page-title">Snake</div>
  <div class="page-sub">Multiplayer · 2–4 players</div>
  <div class="lobby-box">
    <div>
      <div class="lb-label">Your Name</div>
      <input id="name-in" class="lb-input" type="text" maxlength="24" placeholder="Enter your name" autocomplete="off">
    </div>
    <button class="btn-green" id="host-btn">Host New Game</button>
    <div class="lb-err" id="lb-err"></div>
    <div class="std-sess-section">
      <div class="std-sess-hdr">Active Games <span class="std-sess-badge" id="sess-badge">0</span></div>
      <div class="std-sess-list" id="sess-list"><div class="std-no-sess">Loading…</div></div>
    </div>
  </div>
  <a href="/" class="back-link">&#8592; Back to Hub</a>
</div>

<!-- ── WAITING ── -->
<div id="screen-waiting" class="screen">
  <div class="page-title">Snake</div>
  <div class="wait-box">
    <div class="wait-title">Session ID</div>
    <span class="sess-id-val" id="wait-sid">—</span>
    <div class="copy-hint">Tap to copy · Share with friends</div>
    <div class="wait-players" id="wait-players"></div>
    <div class="wait-msg" id="wait-msg">Waiting for players…</div>
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-green" id="start-btn" style="display:none">▶ Start Game</button>
      <button class="btn-ghost" id="leave-btn">Leave</button>
    </div>
  </div>
</div>

<!-- ── GAME ── -->
<div id="screen-game" class="screen">
  <div id="score-bar"></div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="dpad">
    <button class="dpad-btn" id="dpad-up">▲</button>
    <button class="dpad-btn" id="dpad-left">◀</button>
    <button class="dpad-btn" id="dpad-right">▶</button>
    <button class="dpad-btn" id="dpad-down">▼</button>
  </div>
  <button id="chat-fab">💬</button>
  <div id="chat-panel">
    <div id="chat-close">✕</div>
    <div id="chat-msgs"></div>
    <div id="chat-row">
      <input id="chat-inp" placeholder="Message…" maxlength="200" autocomplete="off">
      <button id="chat-send">↑</button>
    </div>
  </div>
</div>

<!-- ── GAME OVER ── -->
<div id="screen-over" class="screen">
  <div id="over-box">
    <div id="over-title">Game Over</div>
    <div id="over-winner"></div>
    <div id="over-scores"></div>
    <button class="btn-green" id="restart-btn" style="display:none">↩ Play Again</button>
    <button class="btn-ghost" id="quit-btn" style="margin-top:8px">Back to Lobby</button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
let myName = localStorage.getItem('phub_name') || '';
let sessionId = null;
let isHost = false;
let isObs = false;
let gameState = null;  // { cols, rows, players, snakes, food, scores }
let myIdx = -1;
let myDir = 'right';

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect(onOpen) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/snake`);
  ws.onopen = () => onOpen && onOpen();
  ws.onclose = () => { if (document.getElementById('screen-game').classList.contains('active')) returnToLobby(); };
  ws.onerror = () => {};
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(err) {} };
}

function wsSend(o) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(o));
}

// ── Message handler ───────────────────────────────────────────────────────────
function handle(msg) {
  switch (msg.type) {

    case 'snake_waiting':
      sessionId = msg.sessionId;
      isHost = msg.players.length === 1;
      renderWaiting(msg.players);
      showScreen('waiting');
      break;

    case 'snake_lobby':
      isHost = msg.players.length > 0 && msg.players[0].name === myName;
      renderWaiting(msg.players);
      break;

    case 'snake_observing':
      sessionId = msg.sessionId;
      isObs = true;
      break;

    case 'snake_start':
      gameState = { cols: msg.cols, rows: msg.rows, players: msg.players, snakes: msg.snakes, food: msg.food, scores: msg.scores };
      myIdx = msg.players.findIndex(p => p.name === myName);
      if (myIdx >= 0) myDir = 'right';
      initCanvas(msg.cols, msg.rows);
      renderScoreBar();
      renderGame();
      showScreen('game');
      break;

    case 'snake_tick':
      if (!gameState) break;
      gameState.snakes = msg.snakes;
      gameState.food = msg.food;
      gameState.scores = msg.scores;
      renderScoreBar();
      renderGame();
      break;

    case 'snake_over':
      if (gameState) { gameState.snakes = gameState.snakes; }
      renderScoreBar();
      showGameOver(msg);
      break;

    case 'snake_err':
      document.getElementById('lb-err').textContent = msg.message;
      break;

    case 'chat':
      addChat(msg.name, msg.text);
      break;
  }
}

// ── Waiting room ──────────────────────────────────────────────────────────────
function renderWaiting(players) {
  const el = document.getElementById('wait-players');
  el.innerHTML = players.map((p, i) => `
    <div class="wait-player">
      <span class="wait-dot" style="background:${p.color}"></span>
      ${i === 0 ? '<span class="wait-crown">★</span>' : ''}
      <span>${esc(p.name)}${p.name === myName ? ' (you)' : ''}</span>
    </div>`).join('');

  const isH = players.length > 0 && players[0].name === myName;
  document.getElementById('start-btn').style.display = isH ? 'block' : 'none';
  document.getElementById('wait-msg').textContent =
    players.length < 2 ? 'Need at least 2 players to start…' : isH ? 'Ready to start!' : 'Waiting for host to start…';
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let CELL = 16;

function initCanvas(cols, rows) {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth;
  const maxH = wrap.clientHeight;
  CELL = Math.floor(Math.min(maxW / cols, maxH / rows));
  if (CELL < 6) CELL = 6;
  canvas.width  = cols * CELL;
  canvas.height = rows * CELL;
}

function renderGame() {
  if (!gameState) return;
  const { cols, rows, snakes, food, players } = gameState;
  ctx.fillStyle = '#060e06';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#0d180d';
  for (let x = 0; x < cols; x++) for (let y = 0; y < rows; y++) {
    ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
  }

  // Food
  for (const f of food) {
    const cx = f.x * CELL + CELL/2;
    const cy = f.y * CELL + CELL/2;
    const r = CELL * 0.35;
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Snakes
  for (let i = 0; i < snakes.length; i++) {
    const sn = snakes[i];
    if (!sn.body.length) continue;
    const color = players[i] ? players[i].color : '#888';
    const alive = sn.alive;

    ctx.fillStyle = alive ? color : color + '44';
    ctx.shadowColor = alive ? color : 'transparent';
    ctx.shadowBlur = alive ? 6 : 0;

    for (let j = 0; j < sn.body.length; j++) {
      const seg = sn.body[j];
      const pad = j === 0 ? 1 : 2;
      ctx.fillRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2);
    }
    ctx.shadowBlur = 0;

    // Draw head with eyes
    if (alive && sn.body.length > 0) {
      const h = sn.body[0];
      ctx.fillStyle = '#000';
      const ex = h.x * CELL + CELL * 0.3;
      const ey = h.y * CELL + CELL * 0.3;
      ctx.fillRect(ex,         ey, 2, 2);
      ctx.fillRect(ex + CELL*0.35, ey, 2, 2);
    }

    // Name label near head
    if (sn.body.length > 0 && players[i]) {
      const h = sn.body[0];
      ctx.font = `bold ${Math.max(9, CELL - 2)}px Arial`;
      ctx.fillStyle = alive ? color : color + '66';
      ctx.textAlign = 'center';
      ctx.fillText(players[i].name.slice(0, 8),
        h.x * CELL + CELL/2,
        h.y * CELL - 3
      );
    }
  }
  ctx.textAlign = 'left';
}

// ── Score bar ─────────────────────────────────────────────────────────────────
function renderScoreBar() {
  if (!gameState) return;
  const { players, scores, snakes } = gameState;
  document.getElementById('score-bar').innerHTML = players.map((p, i) => {
    const alive = snakes[i] ? snakes[i].alive : false;
    return `<div class="score-chip${alive ? '' : ' dead'}">
      <span class="sc-dot" style="background:${p.color}"></span>
      <span class="sc-name">${esc(p.name)}</span>
      <span class="sc-val">${scores[i] || 0}</span>
    </div>`;
  }).join('');
}

// ── Game over ─────────────────────────────────────────────────────────────────
function showGameOver(msg) {
  const sorted = [...msg.scores].sort((a, b) => b.score - a.score);
  document.getElementById('over-title').textContent = msg.winner ? '🏆 Winner!' : 'Game Over';
  document.getElementById('over-winner').textContent = msg.winner ? `${msg.winner} wins!` : 'It\'s a tie!';
  document.getElementById('over-scores').innerHTML = sorted.map((s, i) => `
    <div class="over-row${i === 0 ? ' first' : ''}">
      <span class="over-swatch" style="background:${s.color}"></span>
      <span class="over-name">${esc(s.name)}</span>
      <span class="over-score">${s.score}</span>
    </div>`).join('');
  document.getElementById('restart-btn').style.display = isHost ? 'block' : 'none';
  showScreen('over');
}

// ── Input ─────────────────────────────────────────────────────────────────────
const OPP = { up:'down', down:'up', left:'right', right:'left' };
function sendDir(dir) {
  if (isObs) return;
  if (gameState && myIdx >= 0 && gameState.snakes[myIdx] && !gameState.snakes[myIdx].alive) return;
  if (OPP[dir] === myDir) return;
  myDir = dir;
  wsSend({ type: 'direction', dir });
}

document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                w:'up', s:'down', a:'left', d:'right',
                W:'up', S:'down', A:'left', D:'right' };
  if (map[e.key]) { e.preventDefault(); sendDir(map[e.key]); }
});

// D-pad
document.getElementById('dpad-up').addEventListener('click', () => sendDir('up'));
document.getElementById('dpad-down').addEventListener('click', () => sendDir('down'));
document.getElementById('dpad-left').addEventListener('click', () => sendDir('left'));
document.getElementById('dpad-right').addEventListener('click', () => sendDir('right'));

// Swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) sendDir(dx > 0 ? 'right' : 'left');
  else sendDir(dy > 0 ? 'down' : 'up');
  touchStart = null;
}, { passive: true });

// ── Chat ──────────────────────────────────────────────────────────────────────
const chatPanel = document.getElementById('chat-panel');
document.getElementById('chat-fab').addEventListener('click', () => {
  chatPanel.classList.toggle('open');
  document.getElementById('chat-fab').classList.remove('notif');
});
document.getElementById('chat-close').addEventListener('click', () => chatPanel.classList.remove('open'));
document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-inp').addEventListener('keydown', e => { if (e.key === 'Enter') { e.stopPropagation(); sendChat(); } });

function sendChat() {
  const inp = document.getElementById('chat-inp');
  const text = inp.value.trim();
  if (!text) return;
  wsSend({ type: 'chat', text });
  inp.value = '';
}

function addChat(name, text) {
  const msgs = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = 'cmsg';
  d.innerHTML = `<span class="cmsg-name" style="color:#44ee88">${esc(name)}</span> ${esc(text)}`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  if (!chatPanel.classList.contains('open')) document.getElementById('chat-fab').classList.add('notif');
}

// ── Session polling ───────────────────────────────────────────────────────────
let pollTimer = null;
function startPoll() {
  fetchSessions();
  pollTimer = setInterval(fetchSessions, 5000);
}
function stopPoll() { clearInterval(pollTimer); pollTimer = null; }

function fetchSessions() {
  fetch('/api/snake/sessions').then(r => r.json()).then(renderSessions).catch(() => {});
}

function renderSessions(list) {
  document.getElementById('sess-badge').textContent = list.length;
  const el = document.getElementById('sess-list');
  if (!list.length) { el.innerHTML = '<div class="std-no-sess">No active games — host one!</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="std-sess-row">
      <div class="std-sess-info">
        <div class="std-sess-host">${esc(s.hostName)}'s game</div>
        <div class="std-sess-meta">${esc(s.label)} · ${s.status}</div>
      </div>
      ${s.canJoin ? `<button class="std-btn-join" onclick="joinSession(${s.id})">Join</button>` : ''}
      ${s.canObserve ? `<button class="std-btn-obs" onclick="observeSession(${s.id})">Watch</button>` : ''}
    </div>`).join('');
}

// ── Lobby actions ─────────────────────────────────────────────────────────────
function getName() {
  const n = document.getElementById('name-in').value.trim().slice(0, 24);
  if (!n) { document.getElementById('lb-err').textContent = 'Please enter your name.'; return null; }
  document.getElementById('lb-err').textContent = '';
  myName = n;
  localStorage.setItem('phub_name', n);
  return n;
}

document.getElementById('host-btn').addEventListener('click', () => {
  const name = getName();
  if (!name) return;
  stopPoll();
  connect(() => wsSend({ type: 'snake_create', name }));
});

function joinSession(id) {
  const name = getName();
  if (!name) return;
  stopPoll();
  connect(() => wsSend({ type: 'snake_join', name, sessionId: id }));
}

function observeSession(id) {
  const name = getName();
  if (!name) return;
  stopPoll();
  connect(() => wsSend({ type: 'snake_observe', name, sessionId: id }));
}

// ── Waiting room buttons ──────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => wsSend({ type: 'snake_start' }));

document.getElementById('leave-btn').addEventListener('click', returnToLobby);

document.getElementById('wait-sid').addEventListener('click', () => {
  if (!sessionId) return;
  navigator.clipboard?.writeText(String(sessionId)).then(() => {
    const el = document.getElementById('wait-sid');
    const old = el.textContent;
    el.textContent = 'Copied!';
    setTimeout(() => el.textContent = old, 1200);
  });
});

// ── Game over buttons ─────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('click', () => wsSend({ type: 'snake_restart' }));
document.getElementById('quit-btn').addEventListener('click', returnToLobby);

// ── Return to lobby ───────────────────────────────────────────────────────────
function returnToLobby() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  gameState = null; sessionId = null; isHost = false; isObs = false; myIdx = -1;
  document.getElementById('name-in').value = myName;
  showScreen('lobby');
  startPoll();
}

// ── Canvas resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (gameState && document.getElementById('screen-game').classList.contains('active')) {
    initCanvas(gameState.cols, gameState.rows);
    renderGame();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
if (myName) document.getElementById('name-in').value = myName;
startPoll();
</script>
</body>
</html>
