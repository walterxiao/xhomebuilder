<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tank Battle · Game Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0d5c1;font-family:'Segoe UI',Georgia,sans-serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.active{display:flex}

/* ── Name overlay ── */
#name-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center}
.nov-card{background:#16213e;border:1px solid #2a2a5a;border-radius:10px;padding:40px 36px;text-align:center;width:min(90vw,320px)}
.nov-logo{font-size:3rem;margin-bottom:8px}
.nov-title{font-size:1.1rem;letter-spacing:4px;color:#d4af37;text-transform:uppercase;margin-bottom:6px}
.nov-sub{font-size:.78rem;color:#555577;letter-spacing:2px;margin-bottom:22px}
.nov-card input{width:100%;background:#0f0f22;border:1px solid #2a2a5a;border-radius:4px;color:#e0d5c1;padding:10px 12px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:12px}
.nov-card input:focus{border-color:#d4af37}
.nov-card button{width:100%;background:#d4af37;border:none;border-radius:4px;color:#1a1a2e;padding:11px;font-size:.95rem;font-family:inherit;font-weight:bold;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
.nov-card button:hover{background:#f0c040}

/* ── Shared ── */
.screen-content{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:18px;text-align:center}
.screen-title{font-size:1.8rem;letter-spacing:6px;color:#d4af37;text-transform:uppercase;text-shadow:0 0 20px rgba(212,175,55,.4)}
.screen-sub{font-size:.8rem;color:#7070a0;letter-spacing:2px;text-transform:uppercase}

/* ── Buttons ── */
.btn-primary{background:#d4af37;color:#1a1a2e;border:none;border-radius:6px;padding:13px 28px;font-size:.95rem;font-family:inherit;font-weight:bold;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .15s}
.btn-primary:hover{background:#f0c040}
.btn-primary:disabled{background:#555;color:#888;cursor:not-allowed}
.btn-secondary{background:transparent;color:#9090b0;border:1px solid #3a3a6a;border-radius:6px;padding:11px 24px;font-size:.9rem;font-family:inherit;letter-spacing:1px;cursor:pointer;transition:border-color .15s,color .15s}
.btn-secondary:hover{border-color:#d4af37;color:#d4af37}
.btn-link{color:#555577;font-size:.82rem;letter-spacing:2px;text-decoration:none;text-transform:uppercase;padding:8px;background:none;border:none;cursor:pointer}
.btn-link:hover{color:#d4af37}

/* ── Lobby screen ── */
#screen-lobby .screen-content{justify-content:flex-start;padding-top:32px;overflow-y:auto}
#sessions-list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px}
.session-card{background:#16213e;border:1px solid #2a2a5a;border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left}
.session-info .s-host{font-size:.88rem;color:#c0c0e0;margin-bottom:3px}
.session-info .s-label{font-size:.75rem;color:#555577;letter-spacing:1px}
.session-btns{display:flex;gap:6px;flex-shrink:0}
.session-btns button{border:none;border-radius:5px;padding:7px 14px;font-size:.8rem;font-family:inherit;cursor:pointer;letter-spacing:1px;font-weight:bold;text-transform:uppercase}
.btn-join-s{background:#4fc3f7;color:#1a1a2e}
.btn-join-s:hover{background:#81d4fa}
.btn-obs-s{background:#2a3a5e;color:#c0c0e0;border:1px solid #3a4a7a !important}
.btn-obs-s:hover{background:#3a4a7a}
#no-sessions{color:#444466;font-size:.85rem;letter-spacing:2px;text-transform:uppercase}

/* ── Waiting screen ── */
.player-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px}
.player-row{display:flex;align-items:center;gap:10px;background:#16213e;border-radius:6px;padding:10px 14px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.player-name-w{font-size:.9rem;color:#c0c0e0}
.player-row.empty .player-name-w{color:#333355;font-style:italic}

/* ── Game screen ── */
#screen-game{background:#0d0d1a}
#hud{height:40px;flex-shrink:0;background:#16213e;border-bottom:1px solid #2a2a5a;display:flex;align-items:center;justify-content:center;gap:24px}
.hud-player{display:flex;align-items:center;gap:6px;font-size:.78rem}
.hud-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hud-name{color:#9090b0;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud-hp{display:flex;gap:2px}
.hud-heart{font-size:.7rem}
.hud-heart.dead{opacity:.18}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;position:relative}
#canvas{display:block;max-width:100%;max-height:100%;image-rendering:pixelated}
#flash-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#d4af37;font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;border-radius:8px;border:1px solid #d4af37;pointer-events:none;opacity:0;transition:opacity .4s;text-align:center}
#flash-msg.show{opacity:1}

/* ── Mobile controls ── */
#ctrl-area{flex-shrink:0;background:#16213e;border-top:1px solid #2a2a5a;padding:12px 24px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:16px}
.obs-mode #ctrl-area{display:none}
.joy-outer{width:110px;height:110px;border-radius:50%;position:relative;touch-action:none;flex-shrink:0}
#joystick-outer{background:rgba(30,46,80,0.85);border:2px solid #3a4a7a}
#joystick-fire-outer{background:rgba(80,20,20,0.85);border:2px solid #7a2a2a}
.joy-knob{width:46px;height:46px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#joystick-knob{background:#3a5090;border:2px solid #5a70c0;box-shadow:0 0 8px rgba(90,112,192,0.5)}
#joystick-fire-knob{background:#7a2020;border:2px solid #c04040;box-shadow:0 0 8px rgba(192,64,64,0.5)}
#joystick-fire-outer.overheated{border-color:#ff9800;animation:heat-pulse .4s ease-in-out infinite}
@keyframes heat-pulse{0%,100%{box-shadow:0 0 6px #ff9800}50%{box-shadow:0 0 20px #ff6b00,0 0 40px #ff9800}}

/* ── Game over ── */
.winner-badge{font-size:1.4rem;letter-spacing:3px;color:#d4af37;margin-top:4px}
.winner-dot{display:inline-block;width:18px;height:18px;border-radius:50%;vertical-align:middle;margin-right:8px;margin-bottom:2px}

/* ── Responsive ── */
@media(max-width:480px){
  .screen-title{font-size:1.3rem;letter-spacing:4px}
}
</style>
</head>
<body>

<!-- Name overlay -->
<div id="name-overlay">
  <div class="nov-card">
    <div class="nov-logo">🎯</div>
    <div class="nov-title">Tank Battle</div>
    <div class="nov-sub">Enter your name to play</div>
    <input id="nov-input" type="text" maxlength="24" placeholder="Your name" autocomplete="off">
    <button id="nov-btn">Enter</button>
  </div>
</div>

<!-- Lobby -->
<div class="screen active" id="screen-lobby">
  <div class="screen-content">
    <div class="screen-title">🎯 Tank Battle</div>
    <div class="screen-sub">Destroy all opponents to win</div>
    <div id="sessions-list"><div id="no-sessions">No open sessions</div></div>
    <button class="btn-primary" id="btn-create">Create Game</button>
    <button class="btn-link" onclick="location.href='/'">← Back to Hub</button>
  </div>
</div>

<!-- Waiting room -->
<div class="screen" id="screen-waiting">
  <div class="screen-content">
    <div class="screen-title">Waiting Room</div>
    <div class="screen-sub" id="waiting-sub">Waiting for players…</div>
    <div class="player-list" id="player-list"></div>
    <button class="btn-secondary" id="btn-add-ai" style="display:none">+ Add AI Bot</button>
    <button class="btn-secondary" id="btn-layout" style="display:none">Map: Random ▶</button>
    <button class="btn-primary" id="btn-start" disabled>Start Game</button>
    <div class="screen-sub" id="obs-hint" style="display:none">You are watching</div>
    <button class="btn-link" id="btn-leave">Leave</button>
  </div>
</div>

<!-- Game -->
<div class="screen" id="screen-game">
  <div id="hud"></div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="flash-msg"></div>
  </div>
  <div id="ctrl-area">
    <div class="joy-outer" id="joystick-outer"><div class="joy-knob" id="joystick-knob"></div></div>
    <div class="joy-outer" id="joystick-fire-outer"><div class="joy-knob" id="joystick-fire-knob"></div></div>
  </div>
</div>

<!-- Game over -->
<div class="screen" id="screen-over">
  <div class="screen-content">
    <div class="screen-title">Game Over</div>
    <div id="over-winner" class="winner-badge"></div>
    <button class="btn-primary" id="btn-rematch">Play Again</button>
    <button class="btn-link" id="btn-quit">Quit to Lobby</button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let myName = '';
let ws = null;
let myColor = null;
let isHost = false;
let isObs = false;
let gameW = 800, gameH = 560;

// Game render state
let tanks = [];         // { name, color, x, y, angle, turretAngle, hp, alive, heat, overheated }
let bullets = [];       // { x, y }
let obstacles = [];     // { id, x, y, w, h, hp }
let powerups  = [];     // { id, x, y, type }
let colorMap = {};      // name → color
const overheatEnd = {}; // name → timestamp
const smokes  = [];     // smoke particles
const sparks  = [];     // hit spark particles { x, y, vx, vy, life, decay, r, rgb }
const rings   = [];     // hit ring effects    { x, y, r, maxR, life, rgb }
const tracks  = [];     // tread marks         { x, y, angle, life }
const mflash  = [];     // muzzle flashes      { x, y, rad, life }
const prevPos = {};     // name → {x,y,angle} for track emission
let shakeUntil = 0, shakeAmp = 0;
const PU_DURATION = 8000; // keep in sync with server POWERUP_DURATION

// Input state
const keys = { up: false, down: false, left: false, right: false, fire: false };
let joyAngle = null, joyMag = 0;
let fireJoyAngle = null;
let lastInputSent = {};

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Name setup ────────────────────────────────────────────────────────────────
(function () {
  function submit() {
    const v = document.getElementById('nov-input').value.trim();
    if (!v) { document.getElementById('nov-input').focus(); return; }
    myName = v;
    localStorage.setItem('phub_name', v);
    document.getElementById('name-overlay').style.display = 'none';
    connectWS();
  }
  document.getElementById('nov-btn').onclick = submit;
  document.getElementById('nov-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  const saved = localStorage.getItem('phub_name');
  if (saved) {
    myName = saved;
    document.getElementById('nov-input').value = saved;
    document.getElementById('name-overlay').style.display = 'none';
    connectWS();
  } else {
    setTimeout(() => document.getElementById('nov-input').focus(), 50);
  }
})();

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/tank`);
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch {} };
  ws.onclose = () => { if (document.getElementById('screen-game').classList.contains('active')) showScreen('screen-lobby'); };
}

function wsSend(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ── Message handler ───────────────────────────────────────────────────────────
function handle(msg) {
  switch (msg.type) {

    case 'tank_lobby':
      renderSessions(msg);
      break;

    case 'tank_joined':
      myColor = msg.color;
      isObs = false;
      gameW = msg.W; gameH = msg.H;
      isHost = !!msg.isHost;
      document.getElementById('btn-start').disabled = !isHost || !msg.canStart;
      document.getElementById('obs-hint').style.display = 'none';
      document.getElementById('btn-start').style.display = '';
      showScreen('screen-waiting');
      break;

    case 'tank_obs_joined':
      isObs = true;
      gameW = msg.W; gameH = msg.H;
      document.getElementById('obs-hint').style.display = '';
      document.getElementById('btn-start').style.display = 'none';
      // If game already playing, jump to game screen
      if (msg.state === 'playing' && msg.players) {
        tanks = msg.players;
        obstacles = msg.obstacles || [];
        powerups  = msg.powerups  || [];
        for (const t of tanks) colorMap[t.name] = t.color;
        showScreen('screen-game');
        resizeCanvas();
        renderGame();
      } else {
        showScreen('screen-waiting');
      }
      break;

    case 'tank_start':
      tanks = msg.players;
      bullets = [];
      obstacles = msg.obstacles || [];
      powerups  = msg.powerups  || [];
      for (const t of tanks) colorMap[t.name] = t.color;
      gameW = msg.W; gameH = msg.H;
      buildHud();
      showScreen('screen-game');   // must come before resizeCanvas so clientWidth is non-zero
      resizeCanvas();
      renderGame();
      flash('GO!', 1200);
      document.getElementById('screen-game').classList.toggle('obs-mode', isObs);
      break;

    case 'tank_g': {
      const newTanks = msg.tanks.map(t => ({ ...t, color: colorMap[t.name] || '#888' }));
      // Emit tread tracks based on movement
      for (const t of newTanks) {
        if (!t.alive) { prevPos[t.name] = null; continue; }
        const prev = prevPos[t.name];
        if (prev && Math.hypot(t.x - prev.x, t.y - prev.y) > 5 && tracks.length < 600) {
          tracks.push({ x: prev.x, y: prev.y, angle: prev.angle, life: 1 });
        }
        prevPos[t.name] = { x: t.x, y: t.y, angle: t.angle };
      }
      tanks   = newTanks;
      bullets = msg.bullets;
      if (msg.powerups) powerups = msg.powerups;
      // Muzzle flash for tanks that fired this tick
      for (const name of (msg.fired || [])) {
        const t = tanks.find(t => t.name === name);
        if (t) spawnMuzzleFlash(t);
      }
      updateHud();
      renderGame();
      // Track overheat state per tank
      for (const t of tanks) {
        if (t.overheated) overheatEnd[t.name] = Date.now() + 100;
      }
      break;
    }

    case 'tank_overheat': {
      const end = Date.now() + msg.duration;
      overheatEnd[msg.name] = end;
      if (msg.name === myName || isObs) {
        document.getElementById('joystick-fire-outer').classList.add('overheated');
        setTimeout(() => document.getElementById('joystick-fire-outer').classList.remove('overheated'), msg.duration);
      }
      break;
    }

    case 'tank_hit': {
      const t = tanks.find(t => t.name === msg.name);
      if (t) spawnHit(t.x, t.y, msg.shielded ? '100,180,255' : '255,200,60', false);
      if (msg.name === myName) triggerShake(msg.shielded ? 2 : 5, 280);
      break;
    }

    case 'tank_obs_hit': {
      const o = obstacles.find(o => o.id === msg.id);
      if (o) { o.hp = msg.hp; spawnHit(o.x, o.y, '190,165,120', false); }
      break;
    }

    case 'tank_obs_destroyed': {
      const oi = obstacles.findIndex(o => o.id === msg.id);
      if (oi >= 0) { spawnHit(obstacles[oi].x, obstacles[oi].y, '220,150,70', true); obstacles.splice(oi, 1); }
      break;
    }

    case 'tank_destroyed': {
      const td = tanks.find(t => t.name === msg.name);
      if (td) spawnHit(td.x, td.y, '255,80,50', true);
      if (msg.name === myName) triggerShake(10, 500);
      flash(`${msg.name} destroyed!`, 1500);
      break;
    }

    case 'tank_powerup': {
      const pu_t = tanks.find(t => t.name === msg.name);
      if (pu_t) {
        const puRgb = { speed:'255,238,88', shield:'66,165,245', spread:'171,71,188', rapid:'255,112,67' };
        spawnHit(pu_t.x, pu_t.y, puRgb[msg.puType] || '200,200,200', false);
      }
      if (msg.name === myName) flash(msg.puType.toUpperCase() + '!', 1200);
      break;
    }

    case 'tank_left':
      flash(`${msg.name} left`, 1200);
      showScreen('screen-waiting');
      break;

    case 'tank_over': {
      const w = msg.winner;
      const col = w ? (colorMap[w] || '#d4af37') : '#aaa';
      document.getElementById('over-winner').innerHTML = w
        ? `<span class="winner-dot" style="background:${col}"></span>${esc(w)} wins!`
        : 'Draw!';
      showScreen('screen-over');
      break;
    }

    case 'tank_rematch':
      bullets = [];
      tanks = [];
      obstacles = [];
      powerups = [];
      smokes.length = 0;
      sparks.length = 0;
      rings.length = 0;
      tracks.length = 0;
      mflash.length = 0;
      showScreen('screen-waiting');
      break;

    case 'tank_error':
      alert(msg.text || 'Error');
      break;
  }

  // Update waiting room player list for lobby messages
  if (msg.type === 'tank_lobby') updateWaitingRoom(msg);
}

// ── Session list ──────────────────────────────────────────────────────────────
function renderSessions(msg) {
  // This fires when we get tank_lobby from server — check if it has sessions
  // We do a fetch to get session list
  fetchSessions();
}

let sessionsFetching = false;
function fetchSessions() {
  if (sessionsFetching) return;
  sessionsFetching = true;
  fetch('/api/tank/sessions').then(r => r.json()).then(list => {
    sessionsFetching = false;
    const container = document.getElementById('sessions-list');
    const noEl = document.getElementById('no-sessions');
    if (!list.length) {
      noEl.style.display = '';
      // Remove any old session cards
      container.querySelectorAll('.session-card').forEach(el => el.remove());
      return;
    }
    noEl.style.display = 'none';
    container.querySelectorAll('.session-card').forEach(el => el.remove());
    for (const s of list) {
      const card = document.createElement('div');
      card.className = 'session-card';
      card.innerHTML = `
        <div class="session-info">
          <div class="s-host">${esc(s.hostName)}'s game</div>
          <div class="s-label">${esc(s.label)} · ${esc(s.status)}</div>
        </div>
        <div class="session-btns">
          ${s.canJoin ? `<button class="btn-join-s" data-sid="${s.id}">Join</button>` : ''}
          ${s.canObserve ? `<button class="btn-obs-s" data-sid="${s.id}" data-obs="1">Watch</button>` : ''}
        </div>`;
      container.appendChild(card);
    }
    container.querySelectorAll('.btn-join-s').forEach(b => b.onclick = () => doJoin());
    container.querySelectorAll('.btn-obs-s').forEach(b => b.onclick = () => doObserve());
  }).catch(() => { sessionsFetching = false; });
}

// Poll sessions while on lobby screen
setInterval(() => {
  if (document.getElementById('screen-lobby').classList.contains('active')) fetchSessions();
}, 2000);

// ── Waiting room ──────────────────────────────────────────────────────────────
function updateWaitingRoom(msg) {
  if (!document.getElementById('screen-waiting').classList.contains('active')) return;
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  const MAX = 4;
  const players = msg.players || [];
  for (let i = 0; i < MAX; i++) {
    const row = document.createElement('div');
    if (i < players.length) {
      const p = players[i];
      const aiTag = p.isAI ? '<span style="font-size:.72rem;color:#aaa;margin-left:4px">🤖 AI</span>' : '';
      const hostTag = i === 0 && !p.isAI ? ' <span style="font-size:.72rem;color:#888">(host)</span>' : '';
      row.className = 'player-row';
      row.innerHTML = `<div class="player-dot" style="background:${esc(p.color)}"></div>
        <div class="player-name-w">${esc(p.name)}${aiTag}${hostTag}</div>`;
    } else {
      row.className = 'player-row empty';
      row.innerHTML = `<div class="player-dot" style="background:#222"></div>
        <div class="player-name-w">Waiting…</div>`;
    }
    list.appendChild(row);
  }
  if (isHost) {
    document.getElementById('btn-start').disabled = players.length < 2;
    const addAiBtn = document.getElementById('btn-add-ai');
    addAiBtn.style.display = players.length < MAX ? '' : 'none';
    const layoutBtn = document.getElementById('btn-layout');
    layoutBtn.style.display = '';
    layoutBtn.textContent = `Map: ${msg.layoutName || 'Random'} ▶`;
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function buildHud() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  for (const t of tanks) {
    const div = document.createElement('div');
    div.className = 'hud-player';
    div.id = `hud-${t.name}`;
    const label = t.isAI ? `🤖 ${esc(t.name)}` : esc(t.name);
    div.innerHTML = `<div class="hud-dot" style="background:${esc(t.color)}"></div>
      <div class="hud-name">${label}</div>
      <div class="hud-hp" id="hud-hp-${t.name}">${hpHtml(t.hp, t.alive)}</div>`;
    hud.appendChild(div);
  }
}

function hpHtml(hp, alive) {
  let s = '';
  for (let i = 0; i < 5; i++) s += `<span class="hud-heart${i < hp && alive ? '' : ' dead'}">♥</span>`;
  return s;
}

function heatHtml(heat, overheated) {
  if (overheated) return '<span style="font-size:.65rem;color:#ff9800;letter-spacing:1px">🔥HOT</span>';
  const pct = Math.round((heat / 10) * 100);
  const col = pct > 70 ? '#ff6b00' : pct > 40 ? '#ffa726' : '#66bb6a';
  return `<span style="display:inline-block;width:30px;height:5px;background:#333;border-radius:3px;vertical-align:middle;margin-left:4px"><span style="display:block;width:${pct}%;height:100%;background:${col};border-radius:3px"></span></span>`;
}

function powerupHtml(type, end) {
  if (!type) return '';
  const rem = Math.max(0, end - Date.now());
  const pct = Math.round(rem / PU_DURATION * 100);
  const cols  = { speed:'#ffee58', shield:'#42a5f5', spread:'#ab47bc', rapid:'#ff7043' };
  const names = { speed:'SPD', shield:'DEF', spread:'✦✦✦', rapid:'RAPID' };
  const col = cols[type] || '#aaa';
  return `<span style="font-size:.6rem;color:${col};margin-left:4px">${names[type]||type}</span>`
       + `<span style="display:inline-block;width:22px;height:4px;background:#333;border-radius:3px;vertical-align:middle;margin-left:2px">`
       + `<span style="display:block;width:${pct}%;height:100%;background:${col};border-radius:3px"></span></span>`;
}

function updateHud() {
  for (const t of tanks) {
    const hp = document.getElementById(`hud-hp-${t.name}`);
    if (hp) hp.innerHTML = hpHtml(t.hp, t.alive) + heatHtml(t.heat || 0, t.overheated) + powerupHtml(t.powerupType, t.powerupEnd);
  }
}

function triggerShake(amp, ms) {
  shakeAmp = amp;
  shakeUntil = Date.now() + ms;
}

// ── Smoke particles ───────────────────────────────────────────────────────────
// Emit probability per rendered frame, indexed by damage level (0 = full health)
const SMOKE_RATE = [0, 0.04, 0.10, 0.20, 0.35];

function emitSmoke(t) {
  if (!t.alive) return;
  const damage = 5 - t.hp;
  if (damage <= 0 || smokes.length > 300) return;
  if (Math.random() > SMOKE_RATE[damage]) return;
  const count = damage >= 3 ? 2 : 1;
  for (let i = 0; i < count; i++) {
    smokes.push({
      x: t.x + (Math.random() - 0.5) * 18,
      y: t.y + (Math.random() - 0.5) * 14,
      r: 3 + Math.random() * 4,
      life: 0.65 + Math.random() * 0.35,
      vx: (Math.random() - 0.5) * 0.7,
      vy: -(0.5 + Math.random() * 1.4),
      decay: 0.016 + Math.random() * 0.012,
    });
  }
}

function tickSmokes() {
  for (let i = smokes.length - 1; i >= 0; i--) {
    const s = smokes[i];
    s.x += s.vx; s.y += s.vy;
    s.r  += 0.28;
    s.life -= s.decay;
    if (s.life <= 0) smokes.splice(i, 1);
  }
}

function drawSmokes() {
  for (const s of smokes) {
    const g = Math.round(100 + s.life * 80); // dark grey → lighter as it fades
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${g},${g},${g},${(s.life * 0.55).toFixed(2)})`;
    ctx.fill();
  }
}

// ── Hit effects ───────────────────────────────────────────────────────────────
function spawnHit(x, y, rgb, big) {
  const count = big ? 18 : 9;
  const speedMax = big ? 5.5 : 3.2;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (big ? 1.8 : 0.8) + Math.random() * speedMax;
    sparks.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1,
      decay: 0.055 + Math.random() * 0.055,
      r: big ? 2 + Math.random() * 2 : 1.2 + Math.random() * 1.5,
      rgb,
    });
  }
  rings.push({ x, y, r: 2, maxR: big ? 36 : 20, life: 1, rgb });
  if (big) rings.push({ x, y, r: 2, maxR: 22, life: 0.7, rgb: '255,230,100' });
}

function tickSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.82; s.vy *= 0.82;
    s.life -= s.decay;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.r += (r.maxR - r.r) * 0.28;
    r.life -= 0.09;
    if (r.life <= 0) rings.splice(i, 1);
  }
}

function drawSparks() {
  for (const s of sparks) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${s.rgb},${s.life.toFixed(2)})`;
    ctx.fill();
  }
  for (const r of rings) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r.rgb},${(r.life * 0.9).toFixed(2)})`;
    ctx.lineWidth = r.life * 2.5;
    ctx.stroke();
  }
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth;
  const maxH = wrap.clientHeight;
  const scale = Math.min(maxW / gameW, maxH / gameH);
  canvas.width  = gameW;
  canvas.height = gameH;
  canvas.style.width  = Math.floor(gameW * scale) + 'px';
  canvas.style.height = Math.floor(gameH * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

function renderGame() {
  const W = gameW, H = gameH;
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  // Screen shake
  if (Date.now() < shakeUntil) {
    ctx.translate((Math.random() - 0.5) * shakeAmp, (Math.random() - 0.5) * shakeAmp);
  }

  // Arena background
  ctx.fillStyle = '#0d1b0d';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1a2e1a';
  ctx.lineWidth = 1;
  const GS = 60;
  for (let x = 0; x <= W; x += GS) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += GS) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Tread tracks (below obstacles)
  tickTracks();
  drawTracks();

  // Arena border
  ctx.strokeStyle = '#2e4a2e';
  ctx.lineWidth = 3;
  ctx.strokeRect(1.5, 1.5, W - 3, H - 3);

  // Obstacles
  for (const obs of obstacles) drawObstacle(obs);

  // Power-up crates
  for (const pu of powerups) drawPowerup(pu);

  // Bullets
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffee58';
    ctx.fill();
    ctx.strokeStyle = '#f9a825';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Tanks
  for (const t of tanks) {
    if (!t.alive) continue;
    drawTank(ctx, t);
  }

  // Dead tanks (faded X)
  for (const t of tanks) {
    if (t.alive) continue;
    ctx.save();
    ctx.globalAlpha = 0.3;
    drawTank(ctx, t);
    ctx.globalAlpha = 1;
    ctx.restore();
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.strokeStyle = '#ef5350';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-12, -12); ctx.lineTo(12, 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -12); ctx.lineTo(-12, 12); ctx.stroke();
    ctx.restore();
  }

  // Muzzle flashes (above tanks)
  tickMuzzleFlashes();
  drawMuzzleFlashes();

  // Smoke (above all tanks)
  for (const t of tanks) emitSmoke(t);
  tickSmokes();
  drawSmokes();

  // Hit sparks + rings (topmost layer)
  tickSparks();
  drawSparks();

  ctx.restore();
}

function drawTank(ctx, t) {
  const TW = 34, TH = 44;
  const bodyRad   = t.angle * Math.PI / 180;
  const turretRad = (t.turretAngle !== undefined ? t.turretAngle : t.angle) * Math.PI / 180;
  const hot = t.overheated || (overheatEnd[t.name] && Date.now() < overheatEnd[t.name]);

  // ── Powerup auras ─────────────────────────────────────────────────────
  if (t.shield) {
    ctx.beginPath();
    ctx.arc(t.x, t.y, 28, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(66,165,245,0.75)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  if (t.powerupType === 'speed') {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(bodyRad);
    ctx.beginPath();
    ctx.ellipse(0, 6, 12, 22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,238,88,0.12)';
    ctx.fill();
    ctx.restore();
  }

  // ── Body (tracks + hull) rotates with body angle ──────────────────────
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.rotate(bodyRad);

  ctx.fillStyle = '#333';
  ctx.fillRect(-TW / 2 - 3, -TH / 2, 8, TH);
  ctx.fillRect( TW / 2 - 5, -TH / 2, 8, TH);

  ctx.fillStyle = t.color;
  ctx.fillRect(-TW / 2, -TH / 2, TW, TH);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-TW / 2, -TH / 2, TW, TH);

  ctx.restore();

  // ── Turret + barrel rotate independently ──────────────────────────────
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.rotate(turretRad);

  // Barrel
  const barrelColor = hot ? '#ff6b00' : shadeColor(t.color, -50);
  ctx.fillStyle = barrelColor;
  ctx.fillRect(-4, -TH / 2 - 8, 8, TH / 2 + 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-4, -TH / 2 - 8, 8, TH / 2 + 2);

  // Turret ring
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fillStyle = hot ? '#cc4400' : shadeColor(t.color, -30);
  ctx.fill();
  ctx.strokeStyle = hot ? '#ff9800' : 'rgba(0,0,0,0.4)';
  ctx.lineWidth = hot ? 2 : 1.5;
  ctx.stroke();

  // Overheat glow
  if (hot) {
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,150,0,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  ctx.restore();

  // ── Name label ────────────────────────────────────────────────────────
  ctx.save();
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(t.name, t.x, t.y + TH / 2 + 14 + 1);
  ctx.fillStyle = '#e0e0e0';
  ctx.fillText(t.name, t.x, t.y + TH / 2 + 14);
  ctx.restore();
}

function drawObstacle(obs) {
  const hw = obs.w / 2, hh = obs.h / 2;
  const frac = obs.hp / 50; // 50 = OBS_HP

  // Stone fill — darkens as hp drops
  const base = Math.round(55 + frac * 55); // 55..110
  ctx.fillStyle = `rgb(${base},${Math.round(base * 0.90)},${Math.round(base * 0.78)})`;
  ctx.fillRect(obs.x - hw, obs.y - hh, obs.w, obs.h);

  // Highlight (top-left edge lighter)
  ctx.fillStyle = `rgba(255,255,255,${(0.08 + frac * 0.08).toFixed(2)})`;
  ctx.fillRect(obs.x - hw, obs.y - hh, obs.w, 3);
  ctx.fillRect(obs.x - hw, obs.y - hh, 3, obs.h);

  // Border
  ctx.strokeStyle = 'rgba(0,0,0,0.65)';
  ctx.lineWidth = 2;
  ctx.strokeRect(obs.x - hw, obs.y - hh, obs.w, obs.h);

  // HP bar (only once damaged)
  if (obs.hp < 50) {
    const bw = obs.w * 0.78, bh = 4;
    const bx = obs.x - bw / 2, by = obs.y + hh + 3;
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by, bw, bh);
    const col = frac > 0.5 ? '#66bb6a' : frac > 0.25 ? '#ffa726' : '#ef5350';
    ctx.fillStyle = col;
    ctx.fillRect(bx, by, bw * frac, bh);
  }
}

function drawPowerup(pu) {
  const size  = 22;
  const bob   = Math.sin(Date.now() / 400 + pu.id) * 2;  // gentle float
  const cols  = { speed:'#ffee58', shield:'#42a5f5', spread:'#ab47bc', rapid:'#ff7043' };
  const ltrs  = { speed:'S', shield:'Δ', spread:'✦', rapid:'R' };
  const col   = cols[pu.type] || '#aaa';
  const x = pu.x, y = pu.y + bob;

  // Glow
  ctx.beginPath();
  ctx.arc(x, y, size * 0.9, 0, Math.PI * 2);
  ctx.fillStyle = col.replace(/^#/, '') === col ? col : col + '30';
  ctx.fillStyle = `${col}28`;
  ctx.fill();

  // Crate body
  ctx.fillStyle = '#1e2a1e';
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  const h = size / 2;
  ctx.beginPath();
  ctx.roundRect(x - h, y - h, size, size, 3);
  ctx.fill();
  ctx.stroke();

  // Cross lines
  ctx.beginPath(); ctx.moveTo(x - h, y); ctx.lineTo(x + h, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - h); ctx.lineTo(x, y + h); ctx.stroke();

  // Letter
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = col;
  ctx.fillText(ltrs[pu.type] || '?', x, y);
}

// ── Tread tracks ──────────────────────────────────────────────────────────────
function tickTracks() {
  for (let i = tracks.length - 1; i >= 0; i--) {
    tracks[i].life -= 0.003;
    if (tracks[i].life <= 0) tracks.splice(i, 1);
  }
}

function drawTracks() {
  for (const tr of tracks) {
    ctx.save();
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.angle * Math.PI / 180);
    ctx.globalAlpha = tr.life * 0.22;
    ctx.fillStyle = '#060e06';
    ctx.fillRect(-18, -7, 6, 14);  // left tread
    ctx.fillRect(12,  -7, 6, 14);  // right tread
    ctx.restore();
  }
}

// ── Muzzle flashes ────────────────────────────────────────────────────────────
function spawnMuzzleFlash(t) {
  const TH = 44;
  const rad = (t.turretAngle !== undefined ? t.turretAngle : t.angle) * Math.PI / 180;
  mflash.push({
    x: t.x + Math.sin(rad) * (TH / 2 + 10),
    y: t.y - Math.cos(rad) * (TH / 2 + 10),
    rad,
    life: 1,
  });
}

function tickMuzzleFlashes() {
  for (let i = mflash.length - 1; i >= 0; i--) {
    mflash[i].life -= 0.22;
    if (mflash[i].life <= 0) mflash.splice(i, 1);
  }
}

function drawMuzzleFlashes() {
  for (const f of mflash) {
    const r = 10 * f.life;
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    g.addColorStop(0, `rgba(255,255,200,${f.life.toFixed(2)})`);
    g.addColorStop(1, 'rgba(255,160,0,0)');
    ctx.beginPath();
    ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, ((n >> 16) & 0xff) + pct));
  const g = Math.max(0, Math.min(255, ((n >>  8) & 0xff) + pct));
  const b = Math.max(0, Math.min(255, ((n >>  0) & 0xff) + pct));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

// ── Flash message ─────────────────────────────────────────────────────────────
let flashTimer = null;
function flash(txt, ms) {
  const el = document.getElementById('flash-msg');
  el.textContent = txt;
  el.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), ms || 1500);
}

// ── Input ─────────────────────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp: 'up', KeyW: 'up', ArrowDown: 'down', KeyS: 'down',
  ArrowLeft: 'left', KeyA: 'left', ArrowRight: 'right', KeyD: 'right',
  Space: 'fire',
};

document.addEventListener('keydown', e => {
  const dir = KEY_MAP[e.code];
  if (!dir) return;
  e.preventDefault();
  keys[dir] = true;
  sendInput();
});
document.addEventListener('keyup', e => {
  const dir = KEY_MAP[e.code];
  if (!dir) return;
  keys[dir] = false;
  sendInput();
});

function sendInput() {
  if (isObs || !ws) return;
  const cur = { up: keys.up, down: keys.down, left: keys.left, right: keys.right, fire: keys.fire,
                joyAngle, joyMag, fireJoyAngle };
  if (JSON.stringify(cur) === JSON.stringify(lastInputSent)) return;
  lastInputSent = { ...cur };
  wsSend({ type: 'tank_in', ...cur });
}

// ── Joystick factory ──────────────────────────────────────────────────────────
const JOY_MAX  = 34;
const JOY_DEAD = 9;

function makeJoystick(outer, knob, onMove, onEnd) {
  let active = false, ox = 0, oy = 0, touchId = null;

  function start(e) {
    e.preventDefault();
    if (active) return; // already tracking a finger on this stick
    const t = e.changedTouches ? e.changedTouches[0] : e;
    touchId = (t.identifier !== undefined) ? t.identifier : null;
    active = true;
    const r = outer.getBoundingClientRect();
    ox = r.left + r.width  / 2;
    oy = r.top  + r.height / 2;
    apply(t.clientX, t.clientY, true);
  }

  function move(e) {
    if (!active) return;
    e.preventDefault();
    // Find the specific finger that owns this joystick by its identifier
    let t = null;
    if (e.touches) {
      for (const touch of e.touches) {
        if (touch.identifier === touchId) { t = touch; break; }
      }
    } else { t = e; }
    if (!t) return;
    apply(t.clientX, t.clientY, false);
  }

  function end(e) {
    if (!active) return;
    if (e.changedTouches) {
      // Only end when OUR finger lifts — ignore other fingers
      let found = false;
      for (const t of e.changedTouches) {
        if (t.identifier === touchId) { found = true; break; }
      }
      if (!found) return;
    }
    e.preventDefault();
    active = false;
    touchId = null;
    knob.style.transform = 'translate(-50%, -50%)';
    onEnd();
  }

  function apply(cx, cy, isFirst) {
    let dx = cx - ox, dy = cy - oy;
    const dist = Math.hypot(dx, dy);
    const clamped = Math.min(dist, JOY_MAX);
    if (dist > 0) { dx = dx / dist * clamped; dy = dy / dist * clamped; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if (dist >= JOY_DEAD) {
      const angle = (Math.atan2(dx, -dy) * 180 / Math.PI + 360) % 360;
      const mag   = Math.min(1, (dist - JOY_DEAD) / (JOY_MAX - JOY_DEAD));
      onMove(angle, mag, isFirst);
    } else {
      onMove(null, 0, false);
    }
  }

  outer.addEventListener('touchstart', start, { passive: false });
  outer.addEventListener('touchmove',  move,  { passive: false });
  outer.addEventListener('touchend',   end,   { passive: false });
  // Mouse fallback (single pointer — only when no touch is active)
  outer.addEventListener('mousedown', start);
  document.addEventListener('mousemove', e => { if (active && touchId === null) move(e); });
  document.addEventListener('mouseup',   e => { if (active && touchId === null) end(e); });
}

// Left joystick — movement direction (absolute map coords)
makeJoystick(
  document.getElementById('joystick-outer'),
  document.getElementById('joystick-knob'),
  (angle, mag) => { joyAngle = angle; joyMag = mag; sendInput(); },
  ()           => { joyAngle = null;  joyMag = 0;   sendInput(); }
);

// Right joystick — aim + tap-to-fire + auto-fire while held
let autoFireInterval = null;

makeJoystick(
  document.getElementById('joystick-fire-outer'),
  document.getElementById('joystick-fire-knob'),
  (angle, mag, isFirst) => {
    if (angle !== null) fireJoyAngle = angle;
    sendInput();
    if (isFirst) {
      // Fire immediately on any touch; fall back to last aimed direction if in deadzone
      if (fireJoyAngle !== null) wsSend({ type: 'tank_fire', angle: fireJoyAngle });
      // Keep firing every 3 s while held
      clearInterval(autoFireInterval);
      autoFireInterval = setInterval(() => {
        if (fireJoyAngle !== null) wsSend({ type: 'tank_fire', angle: fireJoyAngle });
      }, 3000);
    }
  },
  () => {
    clearInterval(autoFireInterval);
    autoFireInterval = null;
    /* keep fireJoyAngle so turret stays aimed */
    sendInput();
  }
);

// ── Button actions ────────────────────────────────────────────────────────────
document.getElementById('btn-create').onclick = () => {
  wsSend({ type: 'tank_create', name: myName });
};

function doJoin() {
  wsSend({ type: 'tank_join', name: myName });
}
function doObserve() {
  isObs = true;
  wsSend({ type: 'tank_join', name: myName }); // server handles overflow → observe
}

document.getElementById('btn-layout').onclick = () => {
  wsSend({ type: 'tank_set_layout' });
};

document.getElementById('btn-add-ai').onclick = () => {
  wsSend({ type: 'tank_add_ai' });
};

document.getElementById('btn-start').onclick = () => {
  wsSend({ type: 'tank_start' });
};

document.getElementById('btn-rematch').onclick = () => {
  wsSend({ type: 'tank_rematch' });
};

document.getElementById('btn-leave').onclick = () => {
  if (ws) { ws.close(); ws = null; }
  connectWS();
  showScreen('screen-lobby');
};

document.getElementById('btn-quit').onclick = () => {
  if (ws) { ws.close(); ws = null; }
  connectWS();
  showScreen('screen-lobby');
};

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
